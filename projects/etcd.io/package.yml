distributable:
  # requires a git checkout as of 3.7.0
  url: git+https://github.com/etcd-io/etcd
  ref: ${{version.tag}}

versions:
  github: etcd-io/etcd

provides:
  - bin/etcd
  - bin/etcdctl

runtime:
  env:
    aarch64:
      ETCD_UNSUPPORTED_ARCH: arm64

build:
  dependencies:
    go.dev: ^1.26.5 # as of 3.7.0
  script:
    - make
    - mkdir -p {{prefix}}/bin
    - cp bin/* {{prefix}}/bin
  env:
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie
    # etcd on unsupported platform without ETCD_UNSUPPORTED_ARCH=arm64 set
    #   which has long been excluded from the compatibility promise.
    ETCD_UNSUPPORTED_ARCH: arm64

test:
  dependencies:
    crates.io/killport: "*"
  script:
    - killport 2379 || true
    - etcd &
    - PID=$!
    - sleep 5
    - etcdctl put foo bar
    - test "$(etcdctl get foo | tr '\n' :)" = "foo:bar:"
    - kill $PID
