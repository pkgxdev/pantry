distributable:
  url: https://github.com/dexidp/dex/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: dexidp/dex
  
build:
  dependencies:
    go.dev: ^1.25
  env:
    CGO_ENABLED: 0
    CMD_DIR: ./cmd/dex/
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
      - -buildmode=pie 
  script:
    - sed -i 's|DEV|{{version}}|g' cmd/dex/version.go
    - go build -v -ldflags="${GO_LDFLAGS}" -o "{{prefix}}"/bin/dex "${CMD_DIR}"

provides:
  - bin/dex

test: test "$(dex version|grep Dex|tr -d ' '|cut -d':' -f2)" = {{version}}
