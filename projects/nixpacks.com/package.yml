distributable:
  url: git+https://github.com/railwayapp/nixpacks.git
  ref: ${{version.tag}}

versions:
  github: railwayapp/nixpacks

build:
  dependencies:
    rust-lang.org: ^1.65
    rust-lang.org/cargo: '*'
    github.com/mikefarah/yq: '>=4' # conditional toml dep-version pin
  script:
    # cargo_toml 0.13.0 fails to build; bump that pin to 0.14.0
    - yq -i '(.dependencies.cargo_toml | select(. == "0.13.0")) = "0.14.0"' Cargo.toml
    - cargo install $ARGS
  env:
    ARGS:
      - --root={{prefix}}
      - --path=.

provides:
  - bin/nixpacks

test:
  - nixpacks build $PWD --name test > out.log || true
  - cat out.log | grep 'Nixpacks was unable to generate a build plan for this app'
  - nixpacks -V | grep {{version}}
