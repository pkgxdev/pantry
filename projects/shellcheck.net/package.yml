distributable:
  url: https://github.com/koalaman/shellcheck/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: koalaman/shellcheck/tags

provides:
  - bin/shellcheck

dependencies:
  sourceware.org/libffi: ^3

build:
  dependencies:
    haskell.org: ~9.8
    haskell.org/cabal: ^3
    linux:
      gnu.org/binutils: ~2.44 # haskell is picky about linkers
  script:
    - mkdir -p "{{prefix}}/bin"
    - cabal update
    - cabal install $ARGS --jobs
  env:
    ARGS:
      - --install-method=copy
      - --installdir={{prefix}}/bin

test:
  fixture: |
    #!/bin/sh
    echo "Hello, world!"
  script:
    - shellcheck --version
    - shellcheck $FIXTURE
