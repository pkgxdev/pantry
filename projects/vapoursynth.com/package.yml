distributable:
  url: https://github.com/vapoursynth/vapoursynth/archive/R{{version.major}}.tar.gz
  strip-components: 1

versions:
  github: vapoursynth/vapoursynth
  strip:
    - /^R/

dependencies:
  python.org: ~3.12
  github.com/sekrit-twc/zimg: "*"
  linux:
    # Fix: version `GLIBCXX_3.4.30' not found (required by vspipe)
    gnu.org/gcc/libstdcxx: "*"

runtime:
  env:
    PYTHONHOME: "{{deps.python.org.prefix}}"
    PYTHONPATH: "{{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages:{{prefix}}/lib/python{{deps.python.org.version.major}}/site-packages:$PYTHONPATH"
    linux:
      # v74 needs this. :(
      LD_PRELOAD: "{{deps.python.org.prefix}}/lib/libpython{{deps.python.org.version.marketing}}.so.1.0:$LD_PRELOAD"

build:
  dependencies:
    gnu.org/autoconf: "*"
    gnu.org/automake: "*"
    cython.org: "*"
    gnu.org/libtool: "*"
    nasm.us: "*"
    freedesktop.org/pkg-config: "*"
    # since v74
    mesonbuild.com: "*"
    ninja-build.org: "*"
    linux:
      gnu.org/gcc: "*"
  script:
    # error: 'to_chars' is unavailable: introduced in macOS 13.3
    - run: export MACOSX_DEPLOYMENT_TARGET=13.3
      if: ">=69"
    # the following error is confusing with the above.
    # error: 'to_chars' is unavailable: introduced in macOS 13.4
    - run: export MACOSX_DEPLOYMENT_TARGET=13.4
      if: ">=72"

    - run:
        - ./autogen.sh
        - ./configure $ARGS
        - make --jobs {{ hw.concurrency }} install
        - sed -i -f $PROP "{{prefix}}/lib/pkgconfig"/*.pc
      prop: |
        s|{{pkgx.prefix}}|\${pcfiledir}/../../../..|g
        s|python.org/v{{deps.python.org.version}}|python.org/v{{deps.python.org.version.marketing}}|g
        s/\+brewing//g
      if: <74

    - run:
        - bkpyvenv stage {{prefix}} {{version}}
        - ${{prefix}}/venv/bin/python -m pip install .
        - bkpyvenv seal {{prefix}} vspipe vapoursynth
        - mkdir -p {{prefix}}/lib
        - cd {{prefix}}/lib
        - ln -s $(find ../venv/lib/ -type f -name lib\*) ./
      if: ">=74"
    - ln -s python{{deps.python.org.version.marketing}} {{prefix}}/lib/python{{deps.python.org.version.major}} || true
  env:
    ARGS:
      - --prefix={{prefix}}
      - --disable-silent-rules
      - --disable-dependency-tracking
      - --with-cython={{deps.cython.org.prefix}}/bin/cython
      - --with-python_prefix={{prefix}}
      - --with-python_exec_prefix={{prefix}}

provides:
  - bin/vspipe
  - bin/vapoursynth

test:
  dependencies:
    crates.io/semverator: "*"
    linux:
      strace.io: "*"
      gnu.org/coreutils: "*"
  script:
    - run: |
        if test "{{hw.platform}}" = "darwin"; then
          MACOS_VERSION=$(sw_vers -productVersion)
          if semverator lt $MACOS_VERSION 13.3; then
            echo "Skipping test on macOS $MACOS_VERSION"
            echo "'to_chars' is unavailable: introduced in macOS 13.3"
            exit 0
          fi
        fi
      if: ">=69"
    - python -c 'import vapoursynth'
    - vspipe --version | tee out
    - grep {{version.major}} out
