# https://skaffold.dev/

distributable: ~
warnings:
  - vendored

versions:
  github: GoogleContainerTools/skaffold

build:
  dependencies:
    curl.se: '*'
  working-directory: ${{prefix}}
  script:
    - curl -Lfo skaffold https://storage.googleapis.com/skaffold/releases/v{{version}}/skaffold-$PLATFORM
    - chmod +x skaffold
    - install -Dm755 skaffold '{{prefix}}/bin/skaffold'
  env:
    darwin/aarch64: {PLATFORM: darwin-arm64}
    darwin/x86-64:  {PLATFORM: darwin-amd64}
    linux/aarch64:  {PLATFORM: linux-arm64}
    linux/x86-64:   {PLATFORM: linux-amd64}

provides:
  - bin/skaffold

test: test "$(skaffold version)" = v{{version}}
