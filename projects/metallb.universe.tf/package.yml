# MetalLB — load-balancer implementation for bare-metal K8s (CNCF graduated).
#
# Provides L2 (ARP) and BGP modes to expose K8s Services as
# LoadBalancer type without a cloud provider. The de-facto answer
# for on-prem and home-lab K8s.

distributable:
  url: https://github.com/metallb/metallb/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

versions:
  github: metallb/metallb
  # Skip chart-only tags (metallb-chart-X.Y).
  ignore:
    - /^metallb-chart-/
    - /^frr-tools-image-/
    - /-rc\d+$/

platforms:
  - linux

build:
  dependencies:
    go.dev: "*"
  env:
    CGO_ENABLED: 0
    GO_LDFLAGS:
      - -s
      - -w
      - -X go.universe.tf/metallb/internal/version.gitVersion={{ version.tag }}
  script:
    - mkdir -p {{prefix}}/bin
    - for cmd in controller speaker; do
    - if test ! -d "$cmd"; then continue; fi
    - go build -trimpath -ldflags "$GO_LDFLAGS" -o "{{prefix}}/bin/metallb-$cmd" "./$cmd"
    - done

test:
  - metallb-controller --help
  - metallb-speaker --help

provides:
  - bin/metallb-controller
  - bin/metallb-speaker
