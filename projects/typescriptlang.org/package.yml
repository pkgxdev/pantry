distributable:
  url: https://registry.npmjs.org/typescript/-/typescript-{{version}}.tgz
  strip-components: 1

versions:
  npm: typescript

dependencies:
  nodejs.org: ^20

build:
  dependencies:
    npmjs.com: '*'
  script:
    - npm install $ARGS
  env:
    ARGS:
      - -ddd
      - --global
      - --prefix={{prefix}}
      - --install-links

provides:
  - bin/tsc
  - bin/tsserver

test:
  - run: tsc $FIXTURE
    fixture:
      content: |
        class Test {
          greet() {
            return "Hello, world!";
          }
        };
        var test = new Test();
        document.body.innerHTML = test.greet();
      extname: ts
  - tsc --version | grep {{version}}
