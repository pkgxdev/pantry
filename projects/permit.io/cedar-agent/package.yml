distributable:
  url: https://github.com/permitio/cedar-agent/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

provides:
  - bin/cedar-agent

versions:
  github: permitio/cedar-agent

build:
  dependencies:
    rust-lang.org: '>=1.65'
    rust-lang.org/cargo: '*'
    github.com/mikefarah/yq: '>=4' # safe-edit toml version field
  script:
    # missed version bump
    - yq -i '.package.version = "{{ version }}"' Cargo.toml
    - cargo install --locked --path . --root {{prefix}}

test: test "$(cedar-agent --version)" = "cedar-agent {{version}}"
