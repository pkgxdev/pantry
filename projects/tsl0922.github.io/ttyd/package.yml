distributable:
  url: https://github.com/tsl0922/ttyd/archive/{{version}}.tar.gz
  strip-components: 1

dependencies:
  libuv.org: 1
  github.com/json-c/json-c: ^0.16
  libwebsockets.org: ~4.3 # ABI version changes in 4.4
  zlib.net: 1

versions:
  github: tsl0922/ttyd

build:
  dependencies:
    cmake.org: 3
  working-directory: build
  script:
    - cmake .. -DCMAKE_INSTALL_PREFIX="{{prefix}}"
    - make --jobs {{hw.concurrency}}
    - make install

test:
  dependencies:
    curl.se: '*'
  script:
    - ttyd --version | grep {{version}}
    - ttyd --port 7681 --writable sh >ttyd.log 2>&1 &
    - pid=$!
    - trap 'kill "$pid" 2>/dev/null || true' EXIT

    - for _ in $(seq 1 10); do
    - if curl --fail --silent --output /dev/null http://127.0.0.1:7681/; then
    -   exit 0
    - fi
    - if ! kill -0 "$pid" 2>/dev/null; then
    -   cat ttyd.log >&2
    -   exit 1
    - fi
    - sleep 1
    - done

    - cat ttyd.log >&2

provides:
  - bin/ttyd
