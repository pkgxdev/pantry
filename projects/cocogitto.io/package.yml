distributable:
  url: https://github.com/cocogitto/cocogitto/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

provides:
  - bin/cog

versions:
  github: cocogitto/cocogitto

dependencies:
  libgit2.org: ~1.7 # links to libgit2.so.1.7

build:
  dependencies:
    rust-lang.org: ">=1.65"
    rust-lang.org/cargo: "*"
  script:
    # no --locked flag because it was failing on proc_macro_span_shrink
    - run: cargo install --path . --root {{prefix}}
      if: <7
    - run: cargo install --path crates/cocogitto --root {{prefix}}
      if: ">=7"

test: test "$(cog --version)" = "cog {{version}}"
