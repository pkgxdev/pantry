# yamlfmt — an extensible command-line tool to format YAML files.

distributable:
  url: https://github.com/google/yamlfmt/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: google/yamlfmt

provides:
  - bin/yamlfmt

build:
  dependencies:
    go.dev: ^1.22
  script:
    - go build -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/yamlfmt ./cmd/yamlfmt
  env:
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - run: cp $FIXTURE t.yaml
    fixture: |
      a:    1
      b: 2
  - yamlfmt t.yaml
  - "grep 'a: 1' t.yaml"
