distributable:
  url: https://github.com/juju/juju/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

display-name: juju

versions:
  github: juju/juju

build:
  dependencies:
    go.dev: ~1.25.9
  env:
    CGO_ENABLED: 0
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie
  script:
    # 2.9.57 shipped with the wrong version info
    - run: sed -i 's/2\.9\.58/2.9.57/' version/version.go scripts/win-installer/setup.iss snap/snapcraft.yaml
      if: 2.9.57
    - go build -v -ldflags="${GO_LDFLAGS}" -o "{{ prefix }}"/bin/juju ./cmd/juju/main.go

provides:
  - bin/juju

test: test "$(juju --version| cut -d'-' -f1)" = {{version}}
