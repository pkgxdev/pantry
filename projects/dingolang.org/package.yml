distributable:
  url: https://github.com/MadAppGang/dingo/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

display-name: dingo

versions:
  github: MadAppGang/dingo

build:
  dependencies:
    go.dev: ^1.25
  env:
    CGO_ENABLED: 0
    CMD_DIR: ./cmd/dingo/
    GO_LDFLAGS:
    - -s
    - -w
    linux:
      GO_LDFLAGS:
      - -buildmode=pie
  script:
    - go build -v -ldflags="${GO_LDFLAGS}" -o "{{ prefix }}"/bin/dingo "${CMD_DIR}"

provides:
  - bin/dingo

test: test "$(dingo version| tr -d ' ' | grep Version |cut -d ':' -f 2)" = {{version}}
