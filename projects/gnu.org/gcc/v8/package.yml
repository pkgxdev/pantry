# GCC 8 — legacy version for old-vendored-C++ projects.
#
# Many projects vendoring older C++ libraries (RocksDB 6.3.x, old
# MySQL 5.7, old InnoDB, pre-C++17 codebases generally) hit the
# stricter copy-ctor / atomic / pair-construction rules introduced
# in gcc 12+ libstdc++. They compile cleanly with gcc 8 which was
# the last major to default to C++14 / gnu++14 ABI.
#
# Companion to gnu.org/gcc (latest) for cubefs.io, mysql.com/v5_7,
# and other from-source recipes that can't easily be patched to
# modern C++.

distributable:
  url: https://ftp.gnu.org/gnu/gcc/gcc-{{ version.raw }}/gcc-{{ version.raw }}.tar.xz
  strip-components: 1

versions:
  github: gcc-mirror/gcc/tags
  strip: /^releases\/gcc-/
  # Pin to the 8.x line — drop everything else.
  ignore:
    - /^[0-79]\./
    - /^9\./
    - /^[1-9][0-9]/

# Linux only. Darwin's old SDK situation makes gcc 8 hard to bring
# up — users on darwin needing legacy C++ are better off with clang
# from llvm.org which has its own legacy mode.
platforms:
  - linux

dependencies:
  gnu.org/binutils: '*'
  gnu.org/gmp: ~6
  gnu.org/mpfr: ~4
  gnu.org/mpc: ~1
  zlib.net: ^1.3

build:
  dependencies:
    linux:
      gnu.org/gcc: '*'   # bootstrap with current gcc
    perl.org: '*'
    gnu.org/patch: '*'
    curl.se: '*'
    github.com/westes/flex: '*'

  working-directory: build
  script:
    - ARGS=($ARGS --with-pkgversion="pkgx GCC {{version}}")
    - ../configure "${ARGS[@]}"
    - make --jobs {{ hw.concurrency }}
    - make install

    # gcc symlinks expected by some build systems. This recipe lives
    # one level deeper than the main gnu.org/gcc (v8 subdir), so the
    # relative path to binutils needs `../../../../` (4 levels).
    - run:
        - ln -sf gcc cc
        - ln -sf ../../../../binutils/v\*/bin/ar ar
        - ln -sf ../../../../binutils/v\*/bin/nm nm
        - ln -sf ../../../../binutils/v\*/bin/ranlib ranlib
      working-directory: "{{prefix}}/bin"

  env:
    ARGS:
      - --prefix={{ prefix }}
      - --libdir={{ prefix }}/lib
      - --enable-languages=c,c++,fortran
      - --disable-bootstrap
      - --disable-nls
      - --disable-multilib
      - --with-system-zlib
      - --with-bugurl=https://github.com/pkgxdev/pantry/issues
      # PIE + no-LTO/plugin, mirroring the main gnu.org/gcc recipe's linux
      # handling for old (>=6, <10) gcc. WITHOUT these the compiler
      # executables (cc1/cc1plus) built by the modern pkgx toolchain come
      # out linked such that an older glibc loader SIGSEGVs in dl_main
      # *before the compiler runs* — i.e. cc1 crashed on every single
      # compile (`gcc: internal compiler error: Segmentation fault ...
      # cc1`). The old `gcc --version` test never caught it because that
      # only runs the driver, not cc1. --enable-default-pie is gcc 6+;
      # --disable-lto/--disable-plugin are needed for gcc <10 (the LTO
      # plugin dlopens objects that mix the host ld-linux libc with the
      # bottle's libc at link time).
      - --enable-default-pie
      - --disable-lto
      - --disable-plugin
    linux:
      # Build PIC+PIE and bake the gmp/mpfr/mpc/zlib RUNPATHs into the
      # compiler binaries so cc1/cc1plus are self-contained (no
      # LD_LIBRARY_PATH needed at runtime). Applies to both x86-64 and
      # aarch64.
      CFLAGS: -fPIC -fPIE
      CXXFLAGS: -fPIC -fPIE
      LDFLAGS:
        - -Wl,-rpath,{{deps.gnu.org/mpc.prefix}}/lib:{{deps.gnu.org/mpfr.prefix}}/lib:{{deps.gnu.org/gmp.prefix}}/lib:{{deps.zlib.net.prefix}}/lib
        - -Wl,-rpath-link,{{deps.gnu.org/mpc.prefix}}/lib:{{deps.gnu.org/mpfr.prefix}}/lib:{{deps.gnu.org/gmp.prefix}}/lib:{{deps.zlib.net.prefix}}/lib

test:
  - gcc --version | grep -q "pkgx GCC {{version}}"
  - gcc -dumpversion | grep -q "^8\."
  # Actually exercise the compiler back-ends (cc1/cc1plus), not just the
  # driver: compile, link, AND run both a C and a C++ program. The old
  # version-only test let a bottle whose cc1 SIGSEGV'd on every compile
  # pass CI. This guards against that regression.
  - run: gcc $FIXTURE -o t-c
    fixture:
      extname: c
      content: int main(){return 0;}
  - ./t-c
  - run: g++ $FIXTURE -o t-cc
    fixture:
      extname: cc
      content: |
        #include <vector>
        #include <string>
        int main(){ std::vector<std::string> v{"a","b"}; return v.size()==2 ? 0 : 1; }
  - ./t-cc

provides:
  - bin/ar
  - bin/cc
  - bin/c++
  - bin/cpp
  - bin/g++
  - bin/gcc
  - bin/gcc-ar
  - bin/gcc-nm
  - bin/gcc-ranlib
  - bin/gcov
  - bin/gfortran
  - bin/nm
  - bin/ranlib
