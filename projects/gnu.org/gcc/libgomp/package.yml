distributable:
  url: https://ftp.gnu.org/gnu/gcc/gcc-{{version.raw}}/gcc-{{ version.raw }}.tar.xz
  strip-components: 1

versions:
  github: gcc-mirror/gcc/tags
  strip: /^releases\/gcc-/

dependencies:
  gnu.org/binutils: "*" # linker needs `as`
  gnu.org/gmp: ">=4.2"
  gnu.org/mpfr: ">=2.4.0"
  gnu.org/mpc: ">=0.8.0"
  zlib.net: ^1.3
  darwin/x86-64: # since 15.1.0
    libisl.sourceforge.io: ^0

build:
  dependencies:
    linux:
      gnu.org/gcc: "*"
    gnu.org/make: "*"
    perl.org: "^5.6.1"
    gnu.org/patch: "*"
    curl.se: "*"
    github.com/westes/flex: "*"
  working-directory: build
  script:
    # Applying ians patches on x86-64 too, since he sometimes gets fixes in faster, like:
    # https://github.com/orgs/Homebrew/discussions/5216
    # If we have a patch, apply it
    - run:
        - if test -n "$PATCH{{version.major}}{{version.minor}}"; then
        - curl "$PATCH{{version.major}}{{version.minor}}" | patch -p1
        - fi
      if: darwin
      working-directory: ..

    # if there's no diff yet, unpack iains' source over ours
    - run:
        - if test -n "$BRANCH{{version.major}}{{version.minor}}"; then
        - curl -L "$BRANCH{{version.major}}{{version.minor}}" | tar xz --strip-components=1
        - fi
      if: darwin
      working-directory: ..

    - run:
        - if test "{{hw.platform}}/{{hw.arch}}" = "darwin/x86-64"; then
        # Apply CFI directive fix for x86-64 Darwin (LLVM assembler compatibility)
        - patch -p1 < props/disable-cfi-x86-64-darwin.patch
        # Disable MS ABI stubs on Darwin - not needed and causes CFI/LLVM assembler issues
        - patch -p1 < props/disable-msabi-darwin.patch
        # Remove old frame registration symbols from darwin-unwind.ver (GCC 15+ doesn't provide these)
        - patch -p1 < props/remove-old-frame-symbols-darwin.patch
        - fi
      if: =15.2
      working-directory: ..

    # On Linux, we need to statically link libstdc++ and libgcc
    - run: export ARGS=($ARGS --with-boot-ldflags="-static-libstdc++ -static-libgcc $LDFLAGS")
      if: linux
    - run: export ARGS=($ARGS)
      if: darwin

    # needed to get the LDFLAGS to libgfortran on darwin
    # for -headerpad_max_install_names
    - run: export LDFLAGS_FOR_TARGET="$LDFLAGS"
      if: darwin

    - ../configure "${ARGS[@]}"
    - make all-target-libgomp --jobs {{ hw.concurrency }}
    - make install-target-libgomp

    # Debug: check what GCC installed
    - run: |
        echo "=== After make install-target-libgomp ==="
        echo "=== Looking for gomp.pc files ==="
        find "{{prefix}}" -name "gomp.pc" 2>/dev/null || echo "No gomp.pc found"
        echo ""
        echo "=== lib/pkgconfig content ==="
        ls -laR "{{prefix}}/lib/pkgconfig/" 2>/dev/null || echo "lib/pkgconfig does not exist"
        echo ""
        echo "=== lib64/pkgconfig content ==="
        ls -laR "{{prefix}}/lib64/pkgconfig/" 2>/dev/null || echo "lib64/pkgconfig does not exist"
        echo ""
        echo "=== If gomp.pc exists, show its content ==="
        if [ -f "{{prefix}}/lib64/pkgconfig/gomp.pc" ]; then
          echo "File found at lib64/pkgconfig/gomp.pc:"
          file "{{prefix}}/lib64/pkgconfig/gomp.pc"
          cat "{{prefix}}/lib64/pkgconfig/gomp.pc"
        fi
        if [ -f "{{prefix}}/lib/pkgconfig/gomp.pc" ]; then
          echo "File found at lib/pkgconfig/gomp.pc:"
          file "{{prefix}}/lib/pkgconfig/gomp.pc"
          cat "{{prefix}}/lib/pkgconfig/gomp.pc"
        fi
      if: linux/x86-64|linux/aarch64

    # Create pkg-config file for libgomp (GCC doesn't provide one by default)
    # On 64-bit architectures, create in lib64 and symlink from lib
    - run: |
        mkdir -p "{{prefix}}/lib64/pkgconfig"
        # Remove any stale symlink/file that might exist
        rm -f "{{prefix}}/lib64/pkgconfig/gomp.pc"
        sed -e 's|@TARGET@|{{hw.target}}|g' \
            -e 's|@VERSION@|{{version.raw}}|g' \
            "$PROP" > "{{prefix}}/lib64/pkgconfig/gomp.pc"
      if: linux/x86-64|linux/aarch64
      prop: |
        prefix=${pcfiledir}/../..
        libdir=${prefix}/lib64
        includedir=${prefix}/lib/gcc/@TARGET@/@VERSION@/include
        
        Name: libgomp
        Description: GNU Offloading and Multi Processing Runtime Library
        Version: @VERSION@
        Requires:
        Libs: -L${libdir} -lgomp
        Cflags: -I${includedir}
    
    # Debug: check after sed
    - run: |
        echo "=== After sed gomp.pc creation ==="
        file "{{prefix}}/lib64/pkgconfig/gomp.pc"
        echo ""
        echo "=== lib64/pkgconfig content ==="
        ls -laR "{{prefix}}/lib64/pkgconfig/"
      if: linux/x86-64|linux/aarch64
    
    # Create library symlinks in lib/ pointing to lib64/
    - run: |
        mkdir -p "{{prefix}}/lib/pkgconfig"
        cd "{{prefix}}/lib"
        for f in ../lib64/libgomp.*; do
          ln -sf "$f" "$(basename "$f")"
        done
        # Symlink gomp.pc file - remove stale symlink if it exists
        rm -f pkgconfig/gomp.pc
        ln -sf ../../lib64/pkgconfig/gomp.pc pkgconfig/gomp.pc
      if: linux/x86-64|linux/aarch64

  env:
    # Branch from the Darwin maintainer of GCC, with a few generic fixes and
    # Apple Silicon support, located at https://github.com/iains/gcc-12-branch
    PATCH122: https://raw.githubusercontent.com/Homebrew/formula-patches/1d184289/gcc/gcc-12.2.0-arm.diff
    # https://github.com/iains/gcc-darwin-arm64
    PATCH131: https://raw.githubusercontent.com/Homebrew/formula-patches/master/gcc/gcc-13.1.0.diff
    BRANCH105: https://github.com/iains/gcc-10-branch/archive/refs/heads/gcc-10-5Dr0-pre-0.tar.gz
    BRANCH114: https://github.com/iains/gcc-11-branch/archive/refs/tags/gcc-11.4-darwin-r0.tar.gz
    BRANCH115: https://github.com/iains/gcc-11-branch/archive/refs/tags/gcc-11.5-darwin-r0.tar.gz
    BRANCH123: https://github.com/iains/gcc-12-branch/archive/refs/tags/gcc-12.3-darwin-r0.tar.gz
    BRANCH124: https://github.com/iains/gcc-12-branch/archive/refs/heads/gcc-12-4-darwin.tar.gz
    # no branch for 12.5
    BRANCH125: https://github.com/iains/gcc-12-branch/archive/refs/heads/gcc-12-4-darwin.tar.gz
    BRANCH132: https://github.com/iains/gcc-13-branch/archive/refs/heads/gcc-13-2-darwin.tar.gz
    BRANCH133: https://github.com/iains/gcc-13-branch/archive/refs/heads/gcc-13-3-darwin-pre-0.tar.gz
    BRANCH134: https://github.com/iains/gcc-13-branch/archive/refs/heads/gcc-13-4-darwin-p0.tar.gz
    BRANCH141: https://github.com/iains/gcc-14-branch/archive/refs/heads/gcc-14-1-darwin-pre-0.tar.gz
    BRANCH142: https://github.com/iains/gcc-14-branch/archive/refs/heads/gcc-14-2-darwin-pre-0.tar.gz
    BRANCH143: https://github.com/iains/gcc-14-branch/archive/refs/heads/gcc-14-3-darwin-pre-0.tar.gz
    BRANCH151: https://github.com/iains/gcc-15-branch/archive/refs/heads/gcc-15-1-darwin-rc1.tar.gz
    BRANCH152: https://github.com/iains/gcc-15-branch/archive/refs/heads/gcc-15-2-darwin-pre-0.tar.gz
    ARGS:
      - --prefix={{ prefix }}
      - --libdir={{ prefix }}/lib
      - --enable-languages=c,c++
      - --with-bugurl="https://github.com/pkgxdev/pantry/issues"
      - --disable-bootstrap
      - --disable-nls
      - --with-system-zlib
    linux:
      ARGS:
        - --disable-multilib
        - --enable-default-pie
        - --enable-pie-tools
        - --enable-host-pie
    linux/x86-64:
      LIBDIR: lib64
      LDFLAGS:
        - -pie
      CFLAGS:
        - -fPIC
        - -fPIE
      CXXFLAGS:
        - -fPIC
        - -fPIE
    linux/aarch64:
      LIBDIR: lib64
    darwin:
      LDFLAGS: $LDFLAGS -Wl,-headerpad_max_install_names
      ARGS:
        # Reliance on CLT hard path is yuck.
        - --with-sysroot=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
    darwin/aarch64:
      ARGS:
        # https://en.wikipedia.org/wiki/Darwin_(operating_system)#Darwin_16%E2%80%9319;_OS_X_rebranded_into_macOS
        - --build=aarch64-apple-darwin20.0.0
    darwin/x86-64:
      ARGS:
        - --build=x86_64-apple-darwin20.0.0
      # llvm-as generates __compact_unwind sections, even when told not to. this causes build errors
      # for ^10 on darwin+x86-64
      # https://stackoverflow.com/questions/52211390/trouble-building-gcc-on-mac-cant-find-system-headers
      BOOT_CFLAGS:
        - -Wa,-mmacos-version-min=10.5
      CFLAGS_FOR_TARGET:
        - -Wa,-mmacos-version-min=10.5
      CXXFLAGS_FOR_TARGET:
        - -Wa,-mmacos-version-min=10.5

test:
  dependencies:
    freedesktop.org/pkg-config: "*"
    gnu.org/gcc: "*"
  env:
    CFLAGS: "-I{{prefix}}/lib/gcc/{{hw.target}}/{{version.raw}}/include"
    linux:
      PKG_CONFIG_PATH: "{{prefix}}/lib/pkgconfig:{{prefix}}/lib64/pkgconfig:$PKG_CONFIG_PATH"
      LDFLAGS: "-L{{prefix}}/lib -L{{prefix}}/lib64"
    darwin:
      LDFLAGS: "-L{{prefix}}/lib"
  script:
    - run: |
        echo "=== Checking gomp.pc installation ==="
        ls -la {{prefix}}/lib64/pkgconfig/gomp.pc
        ls -la {{prefix}}/lib/pkgconfig/gomp.pc
        echo ""
        pkg-config --exists gomp
        pkg-config --modversion gomp
      if: linux
    - run: test -f {{prefix}}/lib/libgomp.so
      if: linux
    - run: test -f {{prefix}}/lib/libgomp.dylib
      if: darwin
    - run: gcc -x c -fopenmp $CFLAGS $LDFLAGS -lgomp "$FIXTURE" -o test
      fixture: |
        #include <omp.h>
        #include <stdio.h>
        int main() {
          #pragma omp parallel
          {
            printf("Hello from thread %d\n", omp_get_thread_num());
          }
          return 0;
        }
    - ./test
