distributable:
  url: https://ftp.gnu.org/gnu/gcc/gcc-{{version.raw}}/gcc-{{ version.raw }}.tar.xz
  strip-components: 1

versions:
  github: gcc-mirror/gcc/tags
  strip: /^releases\/gcc-/

platforms: [linux]

dependencies:
  gnu.org/binutils: "*"
  gnu.org/gmp: ">=4.2"
  gnu.org/mpfr: ">=2.4.0"
  gnu.org/mpc: ">=0.8.0"
  zlib.net: ^1.3

build:
  dependencies:
    gnu.org/gcc: "*"
    gnu.org/make: "*"
    perl.org: "^5.6.1"
    gnu.org/patch: "*"
    curl.se: "*"
    github.com/westes/flex: "*"
  working-directory: build
  script:
    - ARGS=($ARGS --with-pkgversion="pkgx GCC {{version}}")
    - export ARGS=("${ARGS[@]}" --with-boot-ldflags="-static-libstdc++ -static-libgcc $LDFLAGS")
    - ../configure "${ARGS[@]}"
    - make --jobs {{ hw.concurrency }}
    - make install
  env:
    ARGS:
      - --prefix={{ prefix }}
      - --libdir={{ prefix }}/lib
      - --enable-languages=jit
      - --enable-host-shared
      - --enable-default-pie
      - --enable-pie-tools
      - --enable-host-pie
      - --disable-bootstrap
      - --disable-multilib
      - --disable-nls
      - --with-system-zlib
    linux/x86-64:
      LDFLAGS:
        - -pie
      CFLAGS:
        - -fPIC
        - -fPIE
      CXXFLAGS:
        - -fPIC
        - -fPIE

test:
  script:
    - test -f {{prefix}}/include/libgccjit.h
    - run: cc $FIXTURE -o test -lgccjit
      fixture:
        extname: c
        content: |
          #include <libgccjit.h>

          int main(void)
          {
            gcc_jit_context *context = gcc_jit_context_acquire();
            if (!context) return 1;
            gcc_jit_context_release(context);
            return 0;
          }
    - ./test
