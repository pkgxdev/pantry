distributable:
  url: https://ftp.gnu.org/gnu/sed/sed-{{version.raw}}.tar.gz
  strip-components: 1

versions:
  url: https://ftp.gnu.org/gnu/sed/
  match: /sed-(\d+\.\d+(\.\d+)?)\.tar\.gz/
  strip:
    - /sed-/
    - /.tar.gz/

build:
  # self-dep so brewkit installs an older sed; then shadow brewkit's libexec
  # sed shim with a direct symlink so bare `sed` calls in generated Makefile
  # snippets don't go through pkgx and race against our +brewing install.
  dependencies:
    gnu.org/sed: "*"
  script:
    - export PATH="{{deps.gnu.org/sed.prefix}}/bin:$PATH"
    - ./configure $ARGS
    - make --jobs {{ hw.concurrency }} install
  env:
    ARGS:
      - --prefix="{{prefix}}"
      - --disable-debug

provides:
  - bin/sed

test:
  fixture: Hello world!
  script:
    - sed -i 's/world/World/g' $FIXTURE
    - test "$(cat $FIXTURE)" = 'Hello World!'
