distributable:
  url: https://ftp.gnu.org/gnu/gsl/gsl-{{version}}.tar.gz
  strip-components: 1

versions:
  url: https://ftp.gnu.org/gnu/gsl/
  match: /gsl-\d+\.\d+(\.\d+)?\.tar\.gz/
  strip:
    - /^gsl-/
    - /\.tar\.gz$/

build:
  script:
    - ./configure --prefix={{prefix}}
    - make --jobs {{hw.concurrency}} install

provides:
  - bin/gsl-config
  - bin/gsl-randist
  - bin/gsl-histogram

test:
  - gsl-config --version | grep {{version}}
