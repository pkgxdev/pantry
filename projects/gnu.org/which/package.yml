distributable:
  url: https://ftp.gnu.org/gnu/which/which-{{version.raw}}.tar.gz
  strip-components: 1

versions:
  url: https://ftp.gnu.org/gnu/which
  match: /which-\d+(\.\d+)*\.tar\.gz/
  strip:
    - /^which-/
    - /\.tar\.gz$/

build:
  script:
    - run: sed -i 's/extern int getopt();/extern int getopt(int, char * const [], const char *);/' getopt.h
      if: darwin
    - ./configure $ARGS
    - make --jobs {{ hw.concurrency }} install
  env:
    ARGS:
      - --prefix="{{prefix}}"
      - --disable-dependency-tracking

provides:
  - bin/which

test: which -a which | grep "{{prefix}}/bin/which"
