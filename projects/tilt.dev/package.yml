distributable:
  url: https://github.com/tilt-dev/tilt/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: tilt-dev/tilt

provides:
  - bin/tilt

build:
  dependencies:
    go.dev: ~1.25.5 # per go.mod
    nodejs.org: ^20
    classic.yarnpkg.com: "*"
    linux/aarch64:
      gnu.org/gcc: "*" # cgo _really_ wants g++/ld.gold
      gnu.org/binutils: ~2.44 # ld.gold is deprecated
  script:
    - make build-js
    - mkdir -p "{{ prefix }}"/bin
    - go build -v -trimpath -mod=vendor -ldflags="$GO_LDFLAGS" -o "{{prefix}}/bin/tilt" ./cmd/tilt
  env:
    GO111MODULE: on
    CGO_ENABLED: 1
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.version={{version}}
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - tilt version | tee out
  - grep "v{{version}}" out
