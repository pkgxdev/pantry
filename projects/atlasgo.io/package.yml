distributable:
  url: https://github.com/ariga/atlas/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: ariga/atlas

provides:
  - bin/atlas

build:
  dependencies:
    go.dev: ~1.24.13
  working-directory: cmd/atlas
  script:
    - go mod download
    - go build -v -trimpath -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/atlas .
  env:
    GO111MODULE: on
    GO_LDFLAGS:
      - -s
      - -w
      - -X ariga.io/atlas/cmd/atlas/internal/cmdapi.version=v{{version}}
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - run: test "$(atlas version | head -n1)" = "atlas version v{{version}}"
    if: <0.23
  - run: test "$(atlas version | head -n1)" = "atlas unofficial version v{{version}}"
    if: ">=0.23<1.2"
  - run: test "$(atlas version | head -n1)" = "atlas community version v{{version}}"
    if: ">=1.2"
