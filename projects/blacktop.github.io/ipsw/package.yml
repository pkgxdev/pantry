distributable:
  url: https://github.com/blacktop/ipsw/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

versions:
  github: blacktop/ipsw

provides:
  - bin/ipsw

build:
  dependencies:
    go.dev: ~1.26
  script:
    - go build -v -trimpath -ldflags="$GO_LDFLAGS" -o '{{ prefix }}/bin/ipsw' ./cmd/ipsw
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X github.com/blacktop/ipsw/cmd/ipsw/cmd.AppVersion={{ version }}
      - -X github.com/blacktop/ipsw/cmd/ipsw/cmd.AppBuildCommit=pkgx
    linux/aarch64:
      CGO_ENABLED: 1
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - ipsw version | tee out
  - grep '{{ version }}' out
  - ipsw device-list | tee out
  - grep 'iPad' out
