distributable:
  url: https://github.com/apollographql/rover/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

provides:
  - bin/rover

dependencies:
  openssl.org: ^1.1
  zlib.net: ^1
  libgit2.org: ~1.7 # links to libgit2.so.1.7

versions:
  github: apollographql/rover

build:
  dependencies:
    rust-lang.org: '>=1.65'
    rust-lang.org/cargo: '*'
    github.com/mikefarah/yq: '>=4' # safe-edit toml version field
    linux:
      perl.org: ^5 # openssl mod
  script:
    # missed version bump
    - yq -i '.package.version = "{{ version }}"' Cargo.toml
    - cargo install --locked --path . --root {{prefix}}

test: test "$(rover --version)" = "Rover {{version}}"
