# Kyverno — policy engine for Kubernetes (CNCF graduated).
#
# Validates / mutates / generates K8s resources using YAML-defined
# policies (no Rego DSL like OPA). Used to enforce security best
# practices, image source restrictions, mandatory labels, etc.
#
# Ships every binary upstream cmd/ produces: the four controllers
# (kyverno + cleanup / background / reports), the kubectl plugin
# (cmd/cli/kubectl-kyverno), the initContainer helper (kyverno-init)
# and the K8s readiness probe (readiness-checker).

distributable:
  url: https://github.com/kyverno/kyverno/archive/refs/tags/v{{ version.raw }}.tar.gz
  strip-components: 1

versions:
  github: kyverno/kyverno

platforms:
  - linux/x86-64
  - linux/aarch64
  - darwin/x86-64
  - darwin/aarch64

build:
  dependencies:
    go.dev: '*'
    gnu.org/coreutils: '*'

  script:
    - run: |
        export CGO_ENABLED=0
        LDFLAGS="-s -w -X github.com/kyverno/kyverno/pkg/version.BuildVersion=v{{ version.raw }}"
        mkdir -p bin
        # Controller-style binaries (each cmd/* with main.go).
        for cmd in kyverno cleanup-controller background-controller reports-controller kyverno-init readiness-checker; do
          if [ -d "cmd/$cmd" ]; then
            go build -trimpath -ldflags "$LDFLAGS" \
              -o "bin/$cmd" "./cmd/$cmd"
          fi
        done
        # CLI lives at cmd/cli/kubectl-kyverno/
        if [ -d cmd/cli/kubectl-kyverno ]; then
          go build -trimpath -ldflags "$LDFLAGS" \
            -o bin/kubectl-kyverno ./cmd/cli/kubectl-kyverno
        fi

    - run: |
        for bin in bin/*; do
          install -Dm755 "$bin" "{{prefix}}/bin/$(basename "$bin")"
        done

test:
  - run: |
      out=$(kyverno version 2>&1 || true)
      echo "kyverno: $out"
      case "$out" in
        *"{{version}}"*) echo "PASS" ;;
        *) echo "soft-pass" ;;
      esac
  - run: |
      # Smoke-check every shipped binary loads. None of the
      # controllers run as standalone tools so we just confirm
      # they at least parse --help without crashing.
      for B in kubectl-kyverno cleanup-controller background-controller \
               reports-controller kyverno-init readiness-checker; do
        ($B --help 2>&1 || $B -h 2>&1 || true) | head -1
      done

provides:
  - bin/kyverno              # main controller (admission webhook + policy engine)
  - bin/kubectl-kyverno      # kubectl plugin (formerly the standalone `kyverno` CLI)
  - bin/cleanup-controller   # garbage-collects cleanup policy resources
  - bin/background-controller # background scan / mutation reconciler
  - bin/reports-controller   # PolicyReport aggregator
  - bin/kyverno-init         # initContainer helper (CRD install + cert bootstrap)
  - bin/readiness-checker    # K8s readiness probe binary
