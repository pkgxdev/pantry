distributable:
  url: https://downloads.sourceforge.net/project/tcl/Tcl/{{ version }}/tcl{{ version }}-src.tar.gz
  strip-components: 1

versions:
  # Scrape the official download page, which lists final releases only. The
  # SourceForge dir listing also exposes rc-only dirs (e.g. 9.0.4/ holds just
  # tcl9.0.4rc0-src.tar.gz), so it resolved to 9.0.4 whose -src tarball 404s.
  url: https://www.tcl-lang.org/software/tcltk/download.html
  match: /tcl\d+\.\d+\.\d+-src\.tar\.gz/
  strip:
    - /^tcl/
    - /-src\.tar\.gz/

build:
  working-directory: unix
  script:
    - ./configure --prefix={{ prefix }}
    - make --jobs {{ hw.concurrency }}
    - make install
    - make install-private-headers

    # fix-machos breaks tclsh, but we need to fix the path to libtcl
    - run: install_name_tool -change {{prefix}}/lib/libtcl{{version.major}}.{{version.minor}}.dylib @loader_path/../lib/libtcl{{version.major}}.{{version.minor}}.dylib  {{prefix}}/bin/tclsh{{version.major}}.{{version.minor}}
      if: darwin

    - run: ln -s tclsh{{version.major}}.{{version.minor}} tclsh
      working-directory: ${{prefix}}/bin
  test: make test
  skip: fix-machos

test:
  - echo 'puts "Hello, World!";' | tclsh
  - test "$(echo 'puts "Hello, World!";' | tclsh)" = 'Hello, World!'

provides:
  - bin/sqlite3_analyzer
  - bin/tclsh{{version.major}}.{{version.minor}}
  - bin/tclsh
