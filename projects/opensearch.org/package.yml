distributable:
  url: https://github.com/opensearch-project/OpenSearch/archive/refs/tags/{{version}}.tar.gz
  strip-components: 1

display-name: opensearch

versions:
  github: opensearch-project/OpenSearch

dependencies:
  openjdk.org: ^21 # since v3
  openmp.llvm.org: ^19

build:
  dependencies:
    cmake.org: 3
    git-scm.org: "*"
    gnu.org/wget: "*"
    gnu.org/gcc: ^11 # for gfortran
    github.com/mikefarah/yq: ">=4" # set cluster.name in the shipped config (yaml comments survive)
    linux:
      # on mac we use the Accelerate framework instead, on linux this is linked statically
      netlib.org/lapack: "*"

  script:
    # there seems to be a loader bug with trying to dlopen libc on macos 12 and earlier.
    # remove this step when macos 12 and under are no longer supported.
    - run:
        - if test "{{hw.platform}}+{{hw.arch}}" = "darwin+x86-64"; then
        - sed -i 's|JNAKernel32Library.getInstance();|//JNAKernel32Library.getInstance();|' server/src/main/java/org/opensearch/bootstrap/Bootstrap.java
        - fi
      if: ^2
    - ./gradlew -Dbuild.snapshot=false ":distribution:archives:no-jdk-{{hw.platform}}-tar:assemble"
    - run: tar --strip-components=1 -xf $SRCROOT/distribution/archives/no-jdk-{{hw.platform}}-tar/build/distributions/opensearch-*.tar.gz
      working-directory: ${{prefix}}
    # yq preserves the yaml comments in this user-facing config; the stock
    # `# cluster.name: my-application` comment stays, the real key is appended
    - run: yq -i '.["cluster.name"] = "opensearch_pkgx"' opensearch.yml
      working-directory: ${{prefix}}/config

    # checkout k-NN plugin
    - run:
        - |
          if [ -d .git ]; then
            git fetch
          else
            git clone https://github.com/opensearch-project/k-NN .
          fi
        - git checkout {{version}}.0
        - git reset --hard
        - git submodule foreach --recursive git reset --hard
        - git submodule update --init --recursive
        - git config --global user.email "hello@pkgx.dev"
        - git config --global user.name "pkgx"
        - sed -i 's|\.withP2Mirrors(Map.of("https://download.eclipse.org/", "https://mirror.umd.edu/eclipse/"))||' gradle/formatting.gradle
      working-directory: k-NN

    # workarounds for m1 build. see: https://github.com/opensearch-project/k-NN/blob/main/DEVELOPER_GUIDE.md#extra-setup-for-mac-m1-machines
    #
    # the distcomp_scalar.cc edit is owned by k-NN's nmslib patch 0005 (>=2.19.6,
    # "fix pragma error") — editing it ourselves dirties the tree and k-NN's
    # `git am` aborts, so only do it on versions that lack the patch. (the SIMD
    # flag, patch 0006's territory, is handled at the cmake step below.)
    - run:
        - if test "{{hw.platform}}+{{hw.arch}}" = "darwin+aarch64"; then
        - sed -i -e 's/-mcpu=apple-a14/-mcpu=apple-m1/g' nmslib/python_bindings/setup.py
        - sed -i -e 's/__aarch64__/__undefine_aarch64__/g' faiss/faiss/utils/distances_simd.cpp
        - test -f ../patches/nmslib/0005-*.patch || sed -i '/#pragma message WARN("ScalarProductSIMD<float>:/d' nmslib/similarity_search/src/distcomp_scalar.cc
        - fi
      if: <3.4.0
      working-directory: k-NN/jni/external

    - run:
        - sed -i -f $PROP jni/CMakeLists.txt jni/cmake/*.cmake
        - export CC=clang
        - export CXX=clang++
      prop: |
        s|/usr/local/opt/libomp/|{{deps.openmp.llvm.org.prefix}}/|g
        s|/opt/homebrew/opt/libomp/|{{deps.openmp.llvm.org.prefix}}/|g
      if: darwin
      working-directory: k-NN

    # nmslib hardcodes -march=native (bakes in the builder's exact CPU). k-NN's
    # nmslib patch 0006 (>=2.19.6) makes it the overridable NMSLIB_SIMD_FLAGS
    # cache var we set below; on versions without 0006 we sed $NMSLIB_SIMD in
    # directly — gated on the patch's absence, since editing the patched file
    # would dirty the tree and abort git am. $NMSLIB_SIMD is per-arch (env).
    # k-NN >=3.4.0 auto-enables AVX512_SPR when the build runner is a Sapphire
    # Rapids Intel CPU (via lscpu), then hard-errors if the compiler lacks
    # -mavx512fp16 (needs gcc 12+; the build uses 11.5). Force it off — plain
    # AVX512 is what gcc 11.5 supports, and not baking the build host's exact CPU
    # into the bottle is what we want for a distributable anyway.
    - run: export KNN_SIMD_ARGS=-DAVX512_SPR_ENABLED=false
      if: ">=3.4.0"
    - run:
        - test -f patches/nmslib/0006-*.patch || sed -i "s/-march=native/$NMSLIB_SIMD/g" external/nmslib/similarity_search/CMakeLists.txt
        - cmake . $CMAKE_ARGS $KNN_SIMD_ARGS -DCONFIG_FAISS=ON -DCONFIG_NMSLIB=ON -DCONFIG_TEST=OFF -DNMSLIB_SIMD_FLAGS="$NMSLIB_SIMD"
        - make
      working-directory: k-NN/jni
    - run: |
        for LIB in *.jnilib; do
          if ! otool -l "$LIB" | grep -q 'path @loader_path '; then
            install_name_tool -add_rpath @loader_path "$LIB"
          fi
        done
      working-directory: k-NN/jni/release
      if: darwin
    - run:
        - ./gradlew build --refresh-dependencies -x integTest -x test -DskipTests=true -Dopensearch.version={{version}} -Dbuild.snapshot=false -Dbuild.version_qualifier=
        - ./gradlew publishPluginZipPublicationToZipStagingRepository -Dopensearch.version={{version}} -Dbuild.snapshot=false -Dbuild.version_qualifier=
        - ./gradlew publishPluginZipPublicationToMavenLocal -Dbuild.snapshot=false -Dbuild.version_qualifier= -Dopensearch.version={{version}}
      working-directory: k-NN
    - run:
        - mkdir -p ./build/distributions/lib
        - cp -v ./jni/release/libopensearchknn* ./build/distributions/lib
        - cd ./build/distributions
        - zip -r opensearch-knn-{{version}}.0.zip lib/
        # the code doesn't like the + in the path
        - TMP=$(mktemp -d /tmp/opensearch-knn-XXXXXX)
        - rmdir $TMP
        - ln -s {{prefix}} $TMP
        - "$TMP/bin/opensearch-plugin install --batch file:`pwd`/opensearch-knn-{{version}}.0.zip"
      working-directory: k-NN
    - run: echo 'export JAVA_LIBRARY_PATH="$OPENSEARCH_HOME/plugins/opensearch-knn/lib:$JAVA_LIBRARY_PATH"' >> opensearch-env
      working-directory: ${{prefix}}/bin
      if: darwin
    - run: echo 'export LD_LIBRARY_PATH="$OPENSEARCH_HOME/plugins/opensearch-knn/lib:$LD_LIBRARY_PATH"' >> opensearch-env
      working-directory: ${{prefix}}/bin
      if: linux
  env:
    # nmslib SIMD target — override the default -march=native (non-portable) per
    # arch; consumed by the k-NN cmake step above (as NMSLIB_SIMD_FLAGS / sed).
    NMSLIB_SIMD: -march=native
    x86-64:
      NMSLIB_SIMD: -march=x86-64
    darwin/aarch64:
      NMSLIB_SIMD: -mcpu=apple-m1
    linux/x86-64:
      # /opt/gnu.org/binutils/v2.43.1/bin/ld: release/libopensearchknn_faiss_avx2.so: undefined reference to `_gfortran_concat_string'
      LDFLAGS: $LDFLAGS -Wl,-lgfortran
    linux:
      CMAKE_ARGS:
        - -DLAPACK_LIBRARIES={{deps.netlib.org/lapack.prefix}}/lib/liblapack.so.{{deps.netlib.org/lapack.version.major}}
        - -DBLAS_LIBRARIES={{deps.netlib.org/lapack.prefix}}/lib/libblas.so.{{deps.netlib.org/lapack.version.major}}

provides:
  - bin/opensearch
  - bin/opensearch-keystore
  - bin/opensearch-plugin
  - bin/opensearch-shard

test:
  dependencies:
    gnu.org/coreutils: ^9
    stedolan.github.io/jq: "*"
    curl.se: "*"
  script:
    - opensearch-plugin list

    # While we'd love a good test like this, `opensearch` doesn't run as root, and managing
    # all the environment passthrough with `sudo` is a nightmare.
    - run:
        - 'opensearch -version | grep "Version: {{version}}"'
        - exit 0
      if: linux

    - mkdir -p test/{data,logs}
    - PORT=$(shuf -i 2000-65000 -n 1)
    - run: ADDED_ARGS=-Ediscovery.type=single-node
      if: ">=2.17.1"
    - opensearch -Ehttp.port=$PORT -Epath.data=$PWD/test/data -Epath.logs=$PWD/test/logs $ADDED_ARGS &
    - pid=$!
    - |
      for i in $(seq 1 60); do
        curl -k --silent --fail http://localhost:$PORT/ | tee output.txt && break || sleep 1
      done
    - test "$(jq .version.number output.txt)" = "\"{{version}}\""
    - run: "curl --fail -XPUT http://localhost:$PORT/my-test-knn-index -H 'Content-Type: application/json' -d @$FIXTURE"
      fixture: |
        {
          "settings": {
            "index.knn": true
          },
          "mappings": {
            "properties": {
              "my_vector1": {
                "type": "knn_vector",
                "dimension": 2
              },
              "my_vector2": {
                "type": "knn_vector",
                "dimension": 4
              }
            }
          }
        }
    - run: "curl --fail -XPUT http://localhost:$PORT/my-test-knn-index/_doc/1?refresh=true -H 'Content-Type: application/json' -d @$FIXTURE"
      fixture: |
        {
          "my_vector1": [1, 2],
          "my_vector2": [1, 2, 3, 4]
        }
    - run: "curl --fail -XPOST http://localhost:$PORT/my-test-knn-index/_search -H 'Content-Type: application/json' -d @$FIXTURE | tee output.txt"
      fixture: |
        {
          "query": {
            "knn": {
              "my_vector1": {
                "vector": [1, 2],
                "k": 1
              }
            }
          }
        }
    - kill $pid
    - test "$(jq .hits.total.value output.txt)" = 1
