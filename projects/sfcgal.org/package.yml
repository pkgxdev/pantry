distributable:
  url: https://gitlab.com/sfcgal/SFCGAL/-/archive/v{{version}}/SFCGAL-v{{version}}.tar.gz
  strip-components: 1

versions:
  gitlab: sfcgal/SFCGAL

dependencies:
  boost.org: "*"
  cgal.org: "*"
  gnu.org/gmp: "*"
  gnu.org/mpfr: "*"

build:
  dependencies:
    cmake.org: "*"
    json.nlohmann.me: "*" # since v2.3.0
    linux:
      gnu.org/gcc: "*"
  script:
    - cmake -S . -B build $CMAKE_ARGS
    - cmake --build build
    - cmake --install build
    - run: sed -i "s|{{prefix}}|\$(dirname \$0)/..|g" sfcgal-config
      working-directory: "{{prefix}}/bin"
  env:
    CMAKE_ARGS:
      - -DCMAKE_INSTALL_PREFIX="{{prefix}}
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_FIND_FRAMEWORK=LAST
      - -DCMAKE_VERBOSE_MAKEFILE=ON
      - -Wno-dev
      - -DBUILD_TESTING=OFF

provides:
  - bin/sfcgal-config

test:
  - sfcgal-config --version | tee out
  - grep {{version}} out
  - sfcgal-config --prefix | tee out
  - grep {{prefix}} out
