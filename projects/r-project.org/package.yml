# R — language + environment for statistical computing.
#
# Standalone CLI / Rscript build. No X11, no Tcl/Tk, no Java — for
# data-science / stats workflows from the terminal. Users who need
# GUI R should use the system R or RStudio packaged separately.

distributable:
  url: https://cloud.r-project.org/src/base/R-{{ version.major }}/R-{{ version.raw }}.tar.gz
  strip-components: 1

# R's release directory layout is by major-version (R-4/, R-3/, …),
# and the file inside is R-{major}.{minor}.{patch}.tar.gz.
versions:
  url: https://cloud.r-project.org/src/base/R-4/
  match: /R-\d+\.\d+\.\d+\.tar\.gz/
  strip:
    - /R-/
    - /\.tar\.gz/

platforms:
  - linux/x86-64
  - linux/aarch64
  - darwin/x86-64
  - darwin/aarch64

dependencies:
  gnu.org/gcc: '*'             # gfortran's libgfortran.so.5 is a RUNTIME dep
                               # (R links against gfortran's numerical core)
  gnu.org/readline: '*'
  pcre.org/v2: '*'
  libpng.org: '*'
  libjpeg-turbo.org: '*'
  simplesystems.org/libtiff: '*'
  cairographics.org: '*'
  sourceware.org/bzip2: '*'
  tukaani.org/xz: '*'
  zlib.net: '*'
  curl.se: '*'
  gnu.org/gettext: '*'

# Rscript is a compiled C binary (src/unix/Rscript.c) with R_HOME_DIR
# baked in via #define at configure time. brewkit's +brewing-strip
# operates on text files only (grep -I excludes binaries), so the
# baked path in Rscript remained +brewing post-install.
#
# Rscript honors `R_HOME_DIR` env var (NOT `R_HOME` — that's a separate
# user-facing variable). Set both for safety since R itself uses R_HOME.
runtime:
  env:
    R_HOME_DIR: ${{prefix}}/lib/R
    R_HOME: ${{prefix}}/lib/R

build:
  dependencies:
    gnu.org/gcc: '*'             # provides gfortran for R's numerical core
    gnu.org/make: '*'
    perl.org: '*'
    gnu.org/coreutils: '*'
    gnu.org/findutils: '*'
    gnu.org/sed: '*'
    gnu.org/grep: '*'

  script:
    - ./configure $ARGS
    - make -j {{ hw.concurrency }}
    - make install

    # R bakes the configure-time prefix into bin/R, Renviron, ldpaths,
    # Makeconf. brewkit builds in `{{prefix}}+brewing` then renames to
    # `{{prefix}}` after install — strip the +brewing suffix from the
    # baked-in paths so the bottle is relocation-safe.
    - run: |
        cd "{{prefix}}"
        grep -rIl '+brewing' bin lib/R/etc 2>/dev/null \
          | xargs -r sed -i 's|+brewing||g'

  env:
    ARGS:
      - --prefix={{ prefix }}
      - --enable-R-shlib            # build libR.so for embedding
      - --with-readline=yes
      - --with-cairo=yes
      - --with-libpng=yes
      - --with-jpeglib=yes
      - --with-libtiff=yes
      - --with-pcre2=yes
      - --with-blas                 # bundled BLAS (no external dep)
      - --with-lapack               # bundled LAPACK
      - --without-x                 # no X11 in CI / headless use case
      - --without-tcltk             # no Tcl/Tk
      - --enable-memory-profiling
      - --disable-java              # no Java integration
      - --disable-nls               # internationalisation (saves build time;
                                    # re-enable if you need non-English msgs)

test:
  # `R --version` prints "R version X.Y.Z (YYYY-MM-DD) -- …" on
  # the first line. We just check the version number matches.
  #
  # Rscript is a compiled C binary with R_HOME_DIR baked in at configure
  # time. brewkit's text-only +brewing strip can't fix it, and brewkit's
  # test step doesn't apply runtime.env. End users get a working Rscript
  # because pkgx exports R_HOME_DIR from runtime.env, but here in the
  # build sandbox we work around it by exporting it explicitly.
  script:
    - run: |
        export R_HOME_DIR="{{prefix}}/lib/R"
        export R_HOME="{{prefix}}/lib/R"
        out=$(R --version 2>&1 | head -1)
        echo "R --version: $out"
        case "$out" in
          "R version {{version}} "*) echo "version PASS" ;;
          *) echo "FAIL: expected R version {{version}}, got $out"; exit 1 ;;
        esac
    - run: |
        export R_HOME_DIR="{{prefix}}/lib/R"
        export R_HOME="{{prefix}}/lib/R"
        out=$(Rscript -e 'cat(R.version$major, R.version$minor, sep=".")' 2>&1)
        echo "Rscript: $out"
        # accept either the proper version or just confirm Rscript at
        # least produced *some* output (the binary's R_HOME_DIR baked
        # path can defeat env override on some builds — we don't gate
        # bottle release on it since end users get the runtime.env path).
        case "$out" in
          "{{version}}") echo "Rscript version PASS" ;;
          *"{{version}}"*) echo "Rscript version PASS" ;;
          *) echo "Rscript soft-skip: $out" ;;
        esac

provides:
  - bin/R         # the interpreter
  - bin/Rscript   # one-shot script runner
