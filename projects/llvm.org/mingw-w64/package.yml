# llvm.org/mingw-w64 — LLVM mingw-w64 cross-compiler toolchain, composed
# against pantry's own llvm.org rather than building LLVM from scratch.
#
# mstorsjo's `build-all.sh` has a first-class `--host-clang` mode: given an
# existing clang it SKIPS `build-llvm.sh` entirely and builds only the parts
# that are genuinely Windows-target-specific:
#   - the per-target driver wrappers (install-wrappers.sh)
#   - the mingw-w64 runtime (headers + CRT + winpthreads)
#   - compiler-rt builtins for *-w64-windows-gnu
#   - libunwind + libc++abi + libc++ for the Windows targets
#
# So we depend on pantry's `llvm.org` for clang/lld/llvm-* and hand it to
# build-all.sh as the host compiler. This is correct *and* deliberate:
#
#   - It deletes the multi-hour `build-llvm.sh` stage — and with it the
#     aarch64 self-host miscompile (the bootstrap clang miscompiled LLVM on
#     aarch64; gcc-built llvm.org does not). The Windows runtimes are built by
#     the same gcc-built clang the user will run.
#   - Version skew is impossible: this mstorsjo tag pins LLVM_VERSION
#     llvmorg-22.1.8, so we pin `llvm.org: ^22`. The host clang and the
#     llvm-project source that compiler-rt/libc++ are built from are the same
#     release. (When bumping this package, re-check build-llvm.sh's
#     LLVM_VERSION and move the pin to match.)
#   - No vendored binaries — everything Windows-target is still compiled here.
#
# The wrappers reference llvm.org's clang by its $PKGX_DIR path, which is the
# ordinary pantry dependency reference and is relocated by pkgx like any other.

distributable:
  url: https://github.com/mstorsjo/llvm-mingw/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: mstorsjo/llvm-mingw

# Runtime: the host-side wrappers exec llvm.org's clang/lld (pulls
# libstdcxx/zlib/zstd transitively). The exact version is selected at build
# time from build-llvm.sh's LLVM_VERSION, so this stays a range here.
dependencies:
  llvm.org: 22

build:
  dependencies:
    cmake.org: "*"
    ninja-build.org: "*"
    git-scm.org: "*" # build-compiler-rt/build-libcxx fetch the matching llvm-project src
    python.org: "~3.11"
  env:
    # llvm-mingw builds per-target; we ship the x86_64 + aarch64 Windows
    # cross-compilers (the two brewkit CI cares about).
    TOOLCHAIN_ARCHS:
      - x86_64
      - aarch64
    LLVM_VERSION: llvmorg-{{deps.llvm.org.version}}
    ARGS:
      - "{{prefix}}"
      - --host-clang={{deps.llvm.org.prefix}}/bin/clang
      - --disable-lldb
      - --disable-lldb-mi
      - --disable-clang-tools-extra
  script:
    # mingw's winnt.h pins the Windows TEB to x18 via a global register var
    # (`register _TEB *__wine_current_teb __asm__("x18")`), which clang only
    # accepts when x18 is reserved. Building the mingw host tools (widl/gendef)
    # natively on an aarch64 host trips "register 'x18' unsuitable for global
    # register variables". build-mingw-w64-tools.sh still runs in --host-clang
    # mode, so the reservation is still required. It runs as its own subprocess
    # under build-all.sh, so the flag can't reach the Windows cross-compiles —
    # and -ffixed-x18 is a HARD error for the x86_64 target. `if: linux/aarch64`
    # scopes it to aarch64 builders; -O2 is restated because autoconf drops its
    # default optimization once CFLAGS is set.
    - run: sed -i -f $PROP build-mingw-w64-tools.sh
      if: linux/aarch64
      prop: |
        1a export CFLAGS="${CFLAGS:-} -O2 -ffixed-x18"

    # winpthreads/winstorecompat compile a version.rc that #includes <winver.h>.
    # build-mingw-w64-libraries.sh passes CFLAGS/CXXFLAGS to their configure but
    # no RCFLAGS, so llvm-windres must preprocess via a clang that already knows
    # the mingw sysroot. On macOS llvm-windres resolves its sibling clang to
    # llvm.org's plain (non-mingw) clang and can't find winver.h. Give windres
    # the include path explicitly — the same fix pantry's mingw-w64.org uses.
    # Headers live in the shared generic-w64-mingw32/include ($PREFIX is set by
    # the script at runtime).
    - run: sed -i -f $PROP build-mingw-w64-libraries.sh
      prop: |
        s#CXXFLAGS="$USE_CFLAGS"#CXXFLAGS="$USE_CFLAGS" RCFLAGS="-I$PREFIX/generic-w64-mingw32/include"#

    # Same winres problem, openmp's libomp.rc (#include "winresrc.h"). build-
    # openmp.sh is CMake, not autotools, so it needs CMAKE_RC_FLAGS rather than
    # RCFLAGS. llvm-windres preprocesses via llvm.org's plain clang (no mingw
    # sysroot), which can't find the header on a clean host — confirmed by
    # reproducing it directly. Give windres the include path.
    - run: sed -i -f $PROP build-openmp.sh
      prop: |
        s#-DCMAKE_RC_COMPILER=$arch-w64-mingw32-windres#& -DCMAKE_RC_FLAGS="-I$PREFIX/generic-w64-mingw32/include"#

    # --host-clang (passed via ARGS) skips build-llvm.sh and uses that clang as
    # the host compiler, then builds the wrappers, the mingw-w64 runtime, and
    # the Windows-target compiler-rt + libunwind/libc++.
    - ./build-all.sh $ARGS

    # fix-up relativizes .pc/.cmake and ELF rpaths, but NOT shell shims or
    # symlinks. install-wrappers bakes llvm.org's absolute, exact-version path
    # into the host-clang shim (bin/clang) and into ~17 symlinks (the llvm-*
    # tools plus the clang resource `include`). Rewrite them relative to this
    # toolchain via llvm.org's v{major} symlink, so any matching patch release
    # satisfies them at runtime. Pure-POSIX per-symlink depth — no `realpath
    # --relative-to` (BSD/macOS lacks it).
    - run:
        - dep="{{deps.llvm.org.prefix}}"
        - maj="{{deps.llvm.org.version.major}}"
        # fill this one in
        - ln -sfn "${dep}/bin/lld-link" bin/lld-link
        - find . -type l | while read -r l; do
        - t="$(readlink "$l")"
        - case "$t" in
        - '"$dep"/*) ;;'
        - "*) continue ;;"
        - esac
        - sub="${t#"$dep"/}"
        - d="$(dirname "${l#./}")"
        - ups=""
        - OLDIFS=$IFS
        - IFS=/
        - for c in $d; do
        - ups="../$ups"
        - done
        - IFS=$OLDIFS
        - ln -sfn "${ups}../../v${maj}/${sub}" "$l"
        - done
        # the host-clang shim is a script (its $sr already = this prefix), so
        # point its exec'd clang at the v{major} symlink relative to $sr.
        - sed -i "s#${dep}#\"\$sr\"/../../v${maj}#g" bin/clang
        # audit: neither the shim nor any symlink may still hold the build path
        - if grep -q "$dep" bin/clang || find . -type l -lname "$dep/*" | grep -q .; then
        - echo "ABSOLUTE llvm.org PATHS REMAIN" >&2; exit 1
        - fi
      working-directory: ${{prefix}}

test:
  # winehq.org runs the cross-compiled .exe to prove the toolchain end-to-end.
  # It's linux/x86-64-only (wine's sole pantry platform) and used ONLY here in
  # `test` — never in build — so there's no dependency cycle with the wine
  # recipe (which build-deps on us). On other platforms the compile + PE-magic
  # checks stand on their own; the wine run is guarded by `command -v wine64`.
  dependencies:
    linux/x86-64:
      winehq.org: "*"
  env:
    WINEDEBUG: -all
    WINEDLLOVERRIDES: "mscoree=;mshtml="
    WINEPREFIX: $PWD/.wine
  script:
    - x86_64-w64-mingw32-clang --version
    - run: cp $FIXTURE hello.c
      fixture: |
        #include <stdio.h>
        int main(void) { printf("Hello from native Windows cross-compile.\n"); return 0; }
    - x86_64-w64-mingw32-clang  -o hello-x86_64.exe  hello.c
    - aarch64-w64-mingw32-clang -o hello-aarch64.exe hello.c
    - test "$(head -c 2 hello-x86_64.exe)" = "MZ"
    - test "$(head -c 2 hello-aarch64.exe)" = "MZ"
    - run: test "$(wine64 hello-x86_64.exe | tr -d '\r')" = "Hello from native Windows cross-compile."
      if: linux/x86-64

provides:
  - bin/x86_64-w64-mingw32-clang
  - bin/x86_64-w64-mingw32-clang++
  - bin/x86_64-w64-mingw32-gcc
  - bin/x86_64-w64-mingw32-g++
  - bin/x86_64-w64-mingw32-ar
  - bin/x86_64-w64-mingw32-ranlib
  - bin/x86_64-w64-mingw32-strip
  - bin/x86_64-w64-mingw32-nm
  - bin/x86_64-w64-mingw32-objdump
  - bin/x86_64-w64-mingw32-objcopy
  - bin/x86_64-w64-mingw32-windres
  - bin/x86_64-w64-mingw32-dlltool
  - bin/aarch64-w64-mingw32-clang
  - bin/aarch64-w64-mingw32-clang++
  - bin/aarch64-w64-mingw32-gcc
  - bin/aarch64-w64-mingw32-g++
  - bin/aarch64-w64-mingw32-ar
  - bin/aarch64-w64-mingw32-ranlib
  - bin/aarch64-w64-mingw32-strip
  - bin/aarch64-w64-mingw32-nm
  - bin/aarch64-w64-mingw32-objdump
  - bin/aarch64-w64-mingw32-objcopy
  - bin/aarch64-w64-mingw32-windres
  - bin/aarch64-w64-mingw32-dlltool
  # NOT bin/clang / bin/clang++ — those are llvm.org's; providing them here
  # would make this package a clang provider and conflict with / get pulled in
  # against llvm.org. lld-link/llvm-rc/llvm-cvtres are not in llvm.org's
  # `provides`, so they're safe to expose.
  - bin/lld-link
  - bin/llvm-rc
  - bin/llvm-cvtres
