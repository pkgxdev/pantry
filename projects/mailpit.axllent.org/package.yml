distributable:
  url: https://github.com/axllent/mailpit/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: axllent/mailpit

dependencies:
  linux:
    curl.se/ca-certs: "*"

build:
  dependencies:
    go.dev: ^1.20
    nodejs.org: ^18
    npmjs.com: <11
  script:
    - npm install
    - npm run package
    - go build -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/mailpit
  env:
    CGO_ENABLED: 0
    linux:
      GO_LDFLAGS:
        - -buildmode=pie
    GO_LDFLAGS:
      - -extldflags=-static
      - -w
      - -s
      - -X=github.com/axllent/mailpit/config.Version=v{{version}}

provides:
  - bin/mailpit

test:
  - mailpit version --no-release-check | tee out
  - grep {{version}} out
