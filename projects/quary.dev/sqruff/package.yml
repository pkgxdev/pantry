distributable:
  url: https://github.com/quarylabs/sqruff/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

versions:
  github: quarylabs/sqruff

dependencies:
  linux:
    jemalloc.net: 5

build:
  dependencies:
    rust-lang.org/rustup: '*'
    linux:
      llvm.org: '*' # else toolchain failures in build.rs
      github.com/mikefarah/yq: '>=4' # safe-delete jemallocator dep
      ast-grep.github.io: '*' # structural rust rewrite of the allocator
  working-directory: crates/cli
  script:
    # requires nightly features
    - run:
        - ln -sf {{deps.rust-lang.org/rustup.prefix}}/bin/rustup .
        - rustup default $(grep channel $SRCROOT/rust-toolchain.toml | sed 's/channel = "//;s/"//')
        - ln -sf $HOME/.rustup/toolchains/*/bin/* .
      working-directory: $HOME/.cargo/bin

    # jemalloc breaks linux build: drop the dep and swap the global allocator
    # to std's System (a structural rewrite — attributes stay attached; no-op
    # on modern versions, which use mimalloc)
    - run:
        # per-file: multi-file `yq -i` concatenates toml docs into the first
        - yq -i 'del(.target[].dependencies.jemallocator)' cli/Cargo.toml
        - yq -i 'del(.target[].dependencies.jemallocator)' lib/Cargo.toml
        # guard: ast-grep exits 1 on no-match, and only old (<0.19) layouts
        # have the jemalloc allocator; modern versions use mimalloc
        - if grep -q 'jemallocator::Jemalloc' cli/src/main.rs; then
        - >-
          ast-grep run -l rust
          -p 'static ALLOC: jemallocator::Jemalloc = jemallocator::Jemalloc;'
          -r 'static ALLOC: std::alloc::System = std::alloc::System;'
          -U cli/src/main.rs
        - fi
      working-directory: ..
      if: linux

    # -Ctarget-cpu is breaking darwin/x86-64
    - run: if test -f config.toml; then sed -i '/-Ctarget-cpu=native/d' config.toml; fi
      working-directory: ../../.cargo
      if: darwin/x86-64

    - cargo install --locked --path . --root {{prefix}}
  env:
    PATH: $HOME/.cargo/bin:$PATH

provides:
  - bin/sqruff

test:
  - sqruff --help
  - test "$(sqruff -V)" = "sqruff {{version}}"
  - run: sqruff lint $FIXTURE
    fixture:
      extname: sql
      content: SELECT 1;
  - run: if ! sqruff lint $FIXTURE; then true; else false; fi
    fixture:
      extname: sql
      content: |
        SELECT 1
        SELECT 2
