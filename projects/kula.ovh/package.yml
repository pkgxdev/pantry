distributable:
  url: https://github.com/c0m4r/kula/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

display-name: kula

versions:
  github: c0m4r/kula

platforms:
  - linux

build:
  dependencies:
    go.dev: ^1.25
    gnu.org/coreutils: '*'
  env:
    CONFIG_FILE: config.example.yaml
    VERSION: ${{version.tag}}
    CGO_ENABLED: 0
    CMD_DIR: ./cmd/kula
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie
  script:
    - go build -v
               -ldflags="${GO_LDFLAGS}"
               -o "{{prefix}}"/bin/kula
               -trimpath
               "${CMD_DIR}"
    - install -D -m 0644 ${CONFIG_FILE} {{prefix}}/etc/${CONFIG_FILE}

provides:
  - bin/kula

test: test "$(kula --version|cut -d' ' -f2)" = v{{version}}
