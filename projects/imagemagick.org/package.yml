distributable:
  #FIXME: they use a weird versioning scheme
  url: https://github.com/ImageMagick/ImageMagick/archive/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: ImageMagick/ImageMagick
  # tags are of the form 7.1.2-44 where the `-44` is significant and not a pre-release indicator
  transform: v => v.replace('-', '.')

provides:
  - bin/animate
  - bin/compare
  - bin/composite
  - bin/conjure
  - bin/convert
  - bin/display
  - bin/identify
  - bin/import
  - bin/magick
  - bin/magick-script
  - bin/Magick++-config
  - bin/MagickCore-config
  - bin/MagickWand-config
  - bin/mogrify
  - bin/montage
  - bin/stream

dependencies:
  libpng.org: "*"
  ijg.org: "=8.4" # strange library versioning issues...
  freetype.org: "*"
  libjpeg-turbo.org: "*"
  liblqr.wikidot.com: "*"
  simplesystems.org/libtiff: "*"
  gnu.org/libtool: "*"
  littlecms.com: "*"
  openexr.com: "*"
  openjpeg.org: "*"
  google.com/webp: "*"
  tukaani.org/xz: "*"
  sourceware.org/bzip2: "*"
  gnome.org/libxml2: "*"
  zlib.net: ^1
  jpeg.org/jpegxl: "*"
  perl.org: "*"
  libzip.org: "*"
  darwin:
    openmp.llvm.org: "*"
    github.com/strukturag/libheif: "*"
  linux/x86-64:
    github.com/strukturag/libheif: "*"
  linux:
    x.org/x11: "*"

runtime:
  env:
    MAGICK_HOME: ${{prefix}}

build:
  script:
    - sed -i -e 's|${PACKAGE_NAME}-${PACKAGE_BASE_VERSION}|${PACKAGE_NAME}|g' configure
    - find . -type f -name '*-config.in' -exec sed -i'' -e 's|@PKG_CONFIG@|pkg-config|g' {} +

    - ./configure $ARGS
    - make --jobs {{ hw.concurrency }} install

    - run: sed -i -e 's|^prefix=.*|prefix=${MAGICK_HOME}|g' Magick++-config MagickCore-config MagickWand-config
      working-directory: ${{prefix}}/bin

    # ImageMagick 7 installs pkgconfig files with the full
    # quantum-depth-tagged name (eg. `MagickCore-7.Q16HDRI.pc`) but
    # downstream consumers — most importantly rmagick's extconf.rb,
    # which is the rmagick gem CI test below — call
    # `pkg-config --cflags MagickCore` (unqualified) and bail out
    # when the unqualified .pc is missing.
    #
    # arch's `imagemagick` PKGBUILD creates these compat symlinks too;
    # nixpkgs' magick.nix runs `ln -s` post-install. Mirror that here
    # so `pkgx +ruby +imagemagick.org -- gem install rmagick` resolves
    # the headers without the consumer needing to know the IM7 naming.
    # See pkgxdev/pantry#4030.
    - run: |
        cd "{{prefix}}/lib/pkgconfig"
        for stem in MagickCore Magick++ MagickWand; do
          # match the actual *-7.Q*HDRI.pc filename, since the quantum
          # depth + HDRI flag can vary between builds
          src=$(ls ${stem}-*.pc 2>/dev/null | head -1) || true
          if [ -n "$src" ] && [ ! -e "${stem}.pc" ]; then
            ln -sf "$src" "${stem}.pc"
            echo "linked ${stem}.pc → $src"
          fi
        done
  env:
    # https://github.com/ImageMagick/ImageMagick/issues/1549
    LDFLAGS:
      - -L{{deps.gnu.org/libtool.prefix}}/lib
      - -L{{deps.liblqr.wikidot.com.prefix}}/lib
      - -L{{deps.sourceware.org/bzip2.prefix}}/lib
      - -L{{deps.ijg.org.prefix}}/lib
    ARGS:
      - --prefix={{ prefix }}
      - --libdir={{prefix}}/lib
      - --enable-osx-universal-binary=no
      - --disable-silent-rules
      - --disable-opencl
      - --enable-static
      - --disable-installed # makes us relocatable
      - --enable-shared # https://github.com/pkgxdev/pantry/issues/4030
      - --with-png=yes
      - --with-tiff=yes
      - --with-jxl=yes
      - --with-perl=yes
      - --with-freetype=yes
      - --with-gvc=no
      - --with-modules
      - --with-openjp2
      - --with-openexr
      - --with-webp=yes
      - --with-heic=yes
      - --with-lqr
      - --without-lzma
      - --without-djvu
      - --without-fftw
      - --without-pango
      - --without-wmf
      - --without-perl
      - --enable-openmp
      - --with-zip=yes

    linux:
      ARGS:
        - --with-x=yes
        - --x-includes={{deps.x.org/x11.prefix}}/include
        - --x-libraries={{deps.x.org/x11.prefix}}/lib
    darwin:
      ARGS:
        - --without-x

test:
  - magick -version | grep {{version.tag}}
  - pkgx curl "https://upload.wikimedia.org/wikipedia/commons/6/6a/PNG_Test.png" -o a.png
  - magick identify a.png | grep "a.png PNG"

  # verify that we can build the rmagick gem
  # Previously restricted to darwin because rmagick's extconf.rb
  # couldn't find MagickCore.pc on linux — fixed by the unqualified
  # pkgconfig symlinks above. Now try on linux too.
  - run: pkgx +ruby@3.2.2 gem install rmagick
