distributable:
  url: https://github.com/numpy/numpy/releases/download/v{{version}}/numpy-{{version}}.tar.gz
  strip-components: 1

versions:
  github: numpy/numpy

dependencies:
  openblas.net: ^0.3
  python.org: ~3.12
  mesonbuild.com: "*" # since 2.5
  ninja-build.org: "*" # since 2.5

companions:
  gnu.org/gcc: "*" #gfortran (no Fortran compiler found)

runtime:
  env:
    PYTHONPATH: ${{prefix}}/lib/python3/site-packages:$PYTHONPATH

build:
  dependencies:
    llvm.org: "*" # fails with gcc
  script:
    - run: cp $PROP site.cfg
      if: <2.5
      prop: |
        [openblas]
        libraries = openblas
        library_dirs = {{deps.openblas.net.prefix}}/lib
        include_dirs = {{deps.openblas.net.prefix}}/include
    - python -m pip install --prefix {{prefix}} .
    - run: ln -sf python{{deps.python.org.version.marketing}} python{{deps.python.org.version.major}}
      working-directory: ${{prefix}}/lib
  env:
    # ld unrecognized option '--version'
    CC: clang
    CXX: clang++
    LD: clang
    ATLAS: None
    darwin:
      BLAS: ${{deps.openblas.net.prefix}}/lib/libopenblas.dylib
      LAPACK: ${{deps.openblas.net.prefix}}/lib/libopenblas.dylib
    linux:
      BLAS: ${{deps.openblas.net.prefix}}/lib/libopenblas.so
      LAPACK: ${{deps.openblas.net.prefix}}/lib/libopenblas.so

provides:
  - bin/f2py

test:
  dependencies:
    llvm.org: "*" # fails with gcc
  script:
    - python test.py
    - f2py -v | grep {{version}}
    # gfortran doesn't like this arch
    - run: exit 0
      if: darwin/x86-64
    - f2py -c -m test test.f90
    - ls | grep test.cpython
  env:
    CC: clang
    CXX: clang++
    LD: clang
    darwin:
      # f2py -c uses meson, which sanity-checks gfortran by compiling and RUNNING
      # a test exe. pkgx libgfortran is @rpath/gnu.org/gcc/.../libgfortran.5.dylib,
      # runnable only if the pkgx root is on the exe's rpath. dyld ignores
      # LD_LIBRARY_PATH and SIP strips DYLD_*, so bake the rpath at link time.
      LDFLAGS: $LDFLAGS -Wl,-rpath,{{pkgx.prefix}}
