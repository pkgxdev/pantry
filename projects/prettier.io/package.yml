distributable:
  url: https://registry.npmjs.org/prettier/-/prettier-{{version}}.tgz
  strip-components: 1

versions:
  npm: prettier

dependencies:
  nodejs.org: ^22

build:
  dependencies:
    npmjs.com: ^11
  script:
    npm i $ARGS .
  env:
    ARGS:
      - -ddd
      - --global
      - --prefix={{prefix}}
      - --install-links

provides:
  - bin/prettier

test:
  - prettier --version | grep {{version}}
  - run: prettier $FIXTURE | grep 'const arr = \[1, 2\];'
    fixture:
      content: const arr = [1,2];
      extname: js
