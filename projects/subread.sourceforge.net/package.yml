distributable:
  url: https://downloads.sourceforge.net/project/subread/subread-{{version}}/subread-{{version}}-source.tar.gz
  strip-components: 1

versions:
  url: https://sourceforge.net/projects/subread/rss?path=/
  match: /subread-\d+\.\d+\.\d+-source\.tar\.gz/
  strip:
    - /^subread-/
    - /-source\.tar\.gz/

dependencies:
  zlib.net: ^1

build:
  working-directory: src
  env:
    linux:
      MAKEFILE: Makefile.Linux
    darwin:
      MAKEFILE: Makefile.MacOS
  script:
    # the per-platform Makefiles hardcode gcc and x86-only ISA/tune flags
    # (-mtune=core2, -mmmx/-msse*); neutralize them so cc builds on every arch
    - sed -i -E 's/-mtune=core2//g; s/-m(mmx|sse[0-9]?)//g; s/\bgcc\b/cc/g' "$MAKEFILE" longread-one/Makefile
    - make -f "$MAKEFILE" CC_EXEC=cc --jobs {{ hw.concurrency }}
    - mkdir -p "{{prefix}}/bin"
    - cp -a ../bin/subread-align ../bin/subjunc ../bin/sublong ../bin/featureCounts ../bin/subindel ../bin/exactSNP ../bin/subread-buildindex "{{prefix}}/bin/"

provides:
  - bin/subread-align
  - bin/subjunc
  - bin/sublong
  - bin/featureCounts
  - bin/subindel
  - bin/exactSNP
  - bin/subread-buildindex

test:
  - (featureCounts -v 2>&1 || true) | tee out
  - grep '{{version.raw}}' out
