# external-dns — DNS record sync from K8s resources.
#
# Configures Route 53 / Cloudflare / CoreDNS / etc. based on Ingress
# and Service annotations. K8s SIG project — graduated incubator,
# universally deployed alongside cert-manager in modern clusters.

distributable:
  url: https://github.com/kubernetes-sigs/external-dns/archive/refs/tags/v{{ version.raw }}.tar.gz
  strip-components: 1

versions:
  github: kubernetes-sigs/external-dns

platforms:
  - linux/x86-64
  - linux/aarch64
  - darwin/x86-64
  - darwin/aarch64

build:
  dependencies:
    go.dev: '*'
    gnu.org/coreutils: '*'

  script:
    - run: |
        export CGO_ENABLED=0
        LDFLAGS="-s -w -X sigs.k8s.io/external-dns/pkg/apis/externaldns.Version=v{{ version.raw }}"
        go build -trimpath -ldflags "$LDFLAGS" -o bin/external-dns .

    - install -Dm755 bin/external-dns "{{prefix}}/bin/external-dns"

test:
  - external-dns --version 2>&1 | grep "{{version}}" || external-dns --help 2>&1 | head -3

provides:
  - bin/external-dns
