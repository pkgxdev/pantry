# Citus — horizontally-scalable PostgreSQL extension.
#
# Citus extends Postgres into a distributed SQL database by sharding
# tables across worker nodes. It's a drop-in extension: same Postgres,
# same SQL, just transparently parallelised across a cluster. Common
# alternative to CockroachDB / Yugabyte for users who want to stay on
# vanilla Postgres semantics.
#
# Build: PGXS-based extension. Installs no CLI tools — the artefacts
# are a shared library (citus.so) plus extension control/SQL files,
# loaded inside Postgres via `CREATE EXTENSION citus` after adding it
# to shared_preload_libraries.
#
# PostgreSQL compatibility (Citus 14.x): PG 16, 17, 18.

distributable:
  url: https://github.com/citusdata/citus/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: citusdata/citus

dependencies:
  postgresql.org: "*" # need to match versions
  curl.se: "*" # anonymous statistics collection
  lz4.org: "*" # column compression
  facebook.com/zstd: "*" # column compression
  openssl.org: "*" # transitively via libpq / PG

build:
  dependencies:
    linux:
      # PostgreSQL bottle was built with clang, and Citus extensions
      # inherit CFLAGS via `pg_config --cflags` — those carry
      # clang-specific warnings (e.g. -Werror=unguarded-availability-new)
      # that gcc rejects. Use the same clang to stay compatible.
      llvm.org: "*"
  script:
    - run: eval $(pkgx +postgresql.org^16)
      if: <13
    - run: eval $(pkgx +postgresql.org^17)
      if: ">=13<14"
    - run: eval $(pkgx +postgresql.org^18)
      if: ">=14"
    # darwin only: PG's bottled Makefile.global records a stale Xcode SDK path
    # (the one PG was built against) in CPPFLAGS/LDFLAGS; it's absent on current
    # runners, so <stdio.h>/<inttypes.h> vanish. Rebuild sanitised flag strings
    # (rewriting that SDK path to the live one) and pass them to make below.
    # Linux does NOT get these: PGXS already reads the correct flags from
    # Makefile.global and pkgx's CPATH covers includes — and passing pg_config's
    # value there is a landmine, since older linux PG bottles (e.g. 16) print the
    # literal "not recorded", which clang then treats as input filenames.
    - run:
        - CPPFLAGS_PG=$(pg_config --cppflags | sed -E "s#/Applications/Xcode[^[:space:]]*/SDKs/MacOSX[0-9.]+\\.sdk#$(xcrun --sdk macosx --show-sdk-path)#g")
        - export LDFLAGS_PG=$(pg_config --ldflags | sed -E "s#/Applications/Xcode[^[:space:]]*/SDKs/MacOSX[0-9.]+\\.sdk#$(xcrun --sdk macosx --show-sdk-path)#g")
      if: darwin
    # PGXS ignores prefix=; INSTALL_DIRS (pkglibdir/datadir/includedir_server)
    # redirects the install into our bottle instead of the Postgres dep's tree.
    - ./configure $ARGS
    # citus hard-codes a `.so` decoder-module name; macOS builds `.dylib`
    # ($(DLSUFFIX)). Fix the source ref so install finds the built file.
    - run: sed -i 's/citus_$(DECODER)\.so/citus_$(DECODER)$(DLSUFFIX)/' Makefile.decoder
      if: darwin
      working-directory: src/backend/distributed/cdc
    - run: make --jobs {{ hw.concurrency }}
      if: linux
    - run: make --jobs {{ hw.concurrency }} CPPFLAGS="$CPPFLAGS $CPPFLAGS_PG" LDFLAGS="$LDFLAGS $LDFLAGS_PG"
      if: darwin
    # INSTALL=install: PG's Makefile.global bakes an absolute path to brewkit's
    # `install` wrapper from the runner that built PG; the PATH-resolved name
    # works both in CI and locally.
    - run: make install $INSTALL_DIRS INSTALL=install
      if: linux
    - run: make install $INSTALL_DIRS INSTALL=install CPPFLAGS="$CPPFLAGS $CPPFLAGS_PG" LDFLAGS="$LDFLAGS $LDFLAGS_PG"
      if: darwin
  env:
    CC: clang
    INSTALL_DIRS:
      - pkglibdir={{prefix}}/lib/postgresql
      - datadir={{prefix}}/share/postgresql
      - includedir_server={{prefix}}/include/server
    ARGS:
      - --prefix={{prefix}}
      - --with-libcurl
      - --with-lz4
      - --with-zstd
    darwin:
      # Brewkit's hermetic CPATH masks the Xcode SDK, so Xcode clang's
      # #include_next chain can't reach <stdio.h>, <inttypes.h>, etc.
      # Point the toolchain at the active SDK explicitly.
      SDKROOT: $(xcrun --sdk macosx --show-sdk-path)

# Citus ships no executables — it's a Postgres extension loaded inside
# the server process. Bottle contents:
#   {{prefix}}/lib/postgresql/citus.so
#   {{prefix}}/share/postgresql/extension/citus.control
#   {{prefix}}/share/postgresql/extension/citus--*.sql
# `provides:` validates bin/sbin paths, so omit the key entirely
# (cf. zlib.net, which is also library-only).

test:
  env:
    linux:
      LIB: citus.so
    darwin:
      LIB: citus.dylib
  script:
    # PGXS installs the loadable module as citus.so on linux,
    # citus.dylib on darwin, both under lib/postgresql when the
    # prefix lacks "postgres"/"pgsql" tokens (PGXS convention).
    - test -f "{{prefix}}/lib/postgresql/$LIB"
    - test -f "{{prefix}}/share/postgresql/extension/citus.control"
