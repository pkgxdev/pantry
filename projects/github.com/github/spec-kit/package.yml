distributable:
  url: https://github.com/github/spec-kit/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: github/spec-kit
  ignore: /[1-9]$/ # don't build every release. they are frequent.

dependencies:
  pkgx.sh: ">=1"

build:
  dependencies:
    python.org: ~3.13
  script:
    - bkpyvenv stage {{prefix}} {{version}}
    - ${{prefix}}/venv/bin/pip install .
    - bkpyvenv seal {{prefix}} specify

test:
  - run: specify init test-project --ai copilot --script sh --ignore-agent-tools
    if: <0.10
  - run: specify init test-project --integration copilot --script sh --ignore-agent-tools
    if: ">=0.10"
  - test -f test-project/.specify/memory/constitution.md

provides:
  - bin/specify
