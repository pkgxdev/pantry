distributable:
  url: https://github.com/gosom/google-maps-scraper/archive/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: gosom/google-maps-scraper

dependencies:
  curl.se/ca-certs: "*"

build:
  dependencies:
    go.dev: ^1.21.1
    linux/aarch64:
      # linux/aarch64 wants gold
      gnu.org/gcc: 14
      gnu.org/binutils: ~2.44 # ld.gold is deprecated after 2.44
  script:
    - run: sed -i -f $PROP runner/runner.go
      prop: |
        /version := info.Main.Version/a\
          if version == "(devel)" {\
            version = "{{version}}"\
          }
    - go build $GO_ARGS -ldflags="$GO_LDFLAGS" .
  env:
    GO_ARGS:
      - -trimpath
      - -o="{{prefix}}/bin/google-maps-scraper"
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

provides:
  - bin/google-maps-scraper

test:
  script:
    - google-maps-scraper -version | tee out
    - grep {{version}} out
  env:
    DISABLE_TELEMETRY: 1
