distributable:
  url: https://github.com/gosom/google-maps-scraper/archive/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: gosom/google-maps-scraper

dependencies:
  curl.se/ca-certs: '*'

build:
  dependencies:
    go.dev: ^1.21.1
    linux/aarch64:
      # The previous `~2.44` pin (added in 46162f1c, Nov 2025) kept
      # ld.gold available, but pantry's gcc bumped to 16.x in early
      # 2026 and gcc 16 on aarch64 emits `.aeabi_subsection` /
      # `.aeabi_attribute` directives (BTI/PAC ABI markers) that
      # binutils 2.44's aarch64 `as` doesn't recognise — every
      # `runtime/cgo` translation unit fails with
      #   Error: unknown pseudo-op: `.aeabi_subsection'
      # See #13101. binutils 2.45 added support; bump the floor.
      # ld.gold is removed in 2.45 but pure-Go cgo bins on aarch64
      # don't actually require it (BFD ld works fine for -buildmode=pie).
      gnu.org/gcc: '*'
      gnu.org/binutils: '>=2.45'
  script:
    - go build $GO_ARGS -ldflags="$GO_LDFLAGS" .
  env:
    GO_ARGS:
      - -trimpath
      - -o="{{prefix}}/bin/google-maps-scraper"
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

provides:
  - bin/google-maps-scraper

test:
  dependencies:
    stedolan.github.io/jq: '*'
  script:
    # v1.5.2 is erroring on darwin even though it works
    - google-maps-scraper -input example-queries.txt -json -results restaurants.json -exit-on-inactivity 5m || true
    - test -f restaurants.json
    - cat restaurants.json
    # doesn't actually scrape on linux or our runner due to to the lack of ui libraries for the browser components, and full chrome installs
    - run: test $(jq -s '.[].title' restaurants.json | wc -l) -gt 0
      if: darwin/x86-64
