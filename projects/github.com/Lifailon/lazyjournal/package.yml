# lazyjournal — a TUI for browsing logs from journald, file system,
# Docker and Podman containers.

distributable:
  url: https://github.com/Lifailon/lazyjournal/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: Lifailon/lazyjournal

provides:
  - bin/lazyjournal

build:
  dependencies:
    go.dev: ^1.22
  script:
    - go build -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/lazyjournal .
  env:
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - lazyjournal --version 2>&1 | grep {{version}}