distributable:
  url: https://github.com/lindell/multi-gitter/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: lindell/multi-gitter

provides:
  - bin/multi-gitter

build:
  dependencies:
    go.dev: ~1.25.1
  script:
    - go mod download
    - go build -v -trimpath -ldflags="$GO_LDFLAGS" -o '{{prefix}}/bin/multi-gitter' .
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.version={{version}}
      - -X main.commit=pkgx
      - -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - multi-gitter version | tee out
  - grep {{version}} out
