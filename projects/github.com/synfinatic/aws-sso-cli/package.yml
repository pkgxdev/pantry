distributable:
  url: https://github.com/synfinatic/aws-sso-cli/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: synfinatic/aws-sso-cli

provides:
  - bin/aws-sso

build:
  dependencies:
    go.dev: ^1.19
  script: |
    go mod download
    mkdir -p "{{ prefix }}"/bin
    go build -v -trimpath -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/aws-sso ./cmd/aws-sso
  env:
    GO111MODULE: on
    CGO_ENABLED: 1 # needed for onepassword-sdk-go as of 2.3.0
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.Version={{version}}
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - aws-sso version | tee out
  - grep {{version}} out
