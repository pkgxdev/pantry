# lf — a terminal file manager written in Go, inspired by ranger.

distributable:
  url: https://github.com/gokcehan/lf/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: gokcehan/lf
  strip: /^r/

provides:
  - bin/lf

build:
  dependencies:
    go.dev: ^1.22
  script:
    # -buildvcs=false: otherwise go stamps the binary with our pantry
    # checkout's commit (lf derives its version from VCS build info).
    - go build -ldflags="$GO_LDFLAGS" -buildvcs=false -o {{prefix}}/bin/lf .
  env:
    GO_LDFLAGS:
      - -s
      - -w
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - lf -help
  - lf -doc | grep -i 'terminal file manager'
