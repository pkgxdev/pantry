distributable:
  url: https://github.com/antfu/ni/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

versions:
  github: antfu/ni

dependencies:
  nodejs.org: ">=14"
  npmjs.com: "*"

build:
  dependencies:
    pnpm.io: ^10.6
  script:
    # https://github.com/antfu/eslint-config/issues/529
    - run: npm i -D @antfu/eslint-config@2.21.0
      if: ^0.22
    - pnpm install
    - pnpm run build
    - run:
        - cp $SRCROOT/package.json .
        - cp $SRCROOT/pnpm-workspace.yaml .
        - cp -R $SRCROOT/bin .
        - cp -R $SRCROOT/dist .
        - cp -R $SRCROOT/node_modules .
      working-directory: ${{prefix}}/libexec
    - run:
        - mkdir -p ../../bin
        - |
          for x in *.mjs; do
            ln -s ../libexec/bin/$x ../../bin/${x%.mjs}
          done
      working-directory: ${{prefix}}/libexec/bin
    # renamed in v25
    - run: ln -s nu nup
      working-directory: ${{prefix}}/bin
      if: <25
    - run: ln -s nup nu
      working-directory: ${{prefix}}/bin
      if: ">=25"
  # in v29 @rolldown/binding-darwin-arm64 has binary blobs that don't have enough room
  # to rewrite the headers (and don't need it anyway)
  skip: fix-machos

provides:
  - bin/na
  - bin/nci
  - bin/ni
  - bin/nlx
  - bin/nr
  - bin/nu
  - bin/nun
  - bin/nup

test:
  # or errors
  - run: touch .nirc
    if: ">=0.21.9"
  - (ni --version || true) | grep {{version}}
