distributable:
  url: https://github.com/torognes/vsearch/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: torognes/vsearch/tags

provides:
  - bin/vsearch

dependencies:
  zlib.net: "*"
  sourceware.org/bzip2: "*"
  linux:
    gnu.org/gcc/libstdcxx: 14

build:
  dependencies:
    linux:
      gnu.org/gcc: 14
  script:
    - ./configure --prefix="{{prefix}}"
    - make --jobs {{ hw.concurrency }}
    - make install

test:
  - (vsearch --version 2>&1 || true) | grep "{{version.raw}}"
  - vsearch --derep_fulllength seqs.fa --output out.fa
  - test -s out.fa
