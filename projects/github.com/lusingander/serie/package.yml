# serie — a rich git commit graph in your terminal, like gitk.

distributable:
  url: https://github.com/lusingander/serie/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: lusingander/serie

provides:
  - bin/serie

build:
  dependencies:
    rust-lang.org: ">=1.80"
    rust-lang.org/cargo: "*"
    linux:
      gnu.org/gcc: "*"
  script: cargo install --locked --path . --root {{prefix}}

test: serie --version | grep {{version}}
