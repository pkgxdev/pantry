# lazysql — a cross-platform TUI database management tool.

distributable:
  url: https://github.com/jorgerojas26/lazysql/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: jorgerojas26/lazysql

provides:
  - bin/lazysql

build:
  dependencies:
    go.dev: ^1.22
  script:
    - go build -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/lazysql .
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.version={{version.tag}}
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test: lazysql --version 2>&1 | grep {{version}}
