distributable:
  url: https://github.com/aristocratos/btop/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

display-name: btop

versions:
  github: aristocratos/btop

provides:
  - bin/btop

dependencies:
  linux:
    gnu.org/gcc/libstdcxx: 14

build:
  dependencies:
    linux:
      # yuck. g++ compiler, clang++ linker
      # needed to prevent libstdc++ errors _and_
      # lto linkage errors. just a mess.
      gnu.org/gcc: 14
      llvm.org: '*'
  script:
    # fix compilation errors:
    #  * __clang__ branch is the right one for our gcc+clang link toolchain
    #  * asprintf needs _GNU_SOURCE under glibc; Makefile doesn't pass CFLAGS to these C files
    - run: sed -i -e 's/ifdef __clang__/if 1/' -e '1i\#define _GNU_SOURCE' intel_gpu_top.c
      if: linux/x86-64
      working-directory: src/linux/intel_gpu_top

    - make
    - make install PREFIX={{prefix}}
  env:
    linux:
      CXX: g++
      LD: clang++
      CXXFLAGS: $CXXFLAGS -ffat-lto-objects
      LDFLAGS: $LDFLAGS -Wl,-lstdc++,-ldl -fno-lto

test: btop --version | grep {{version}}
