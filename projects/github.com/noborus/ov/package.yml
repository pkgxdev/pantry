# ov — a terminal feature-rich pager (follow mode, wide-column tables,
# horizontal scroll, search, etc.).

distributable:
  url: https://github.com/noborus/ov/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: noborus/ov

provides:
  - bin/ov

build:
  dependencies:
    go.dev: ^1.22
  script:
    - go build -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/ov .
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.Version={{version}}
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - ov --version | grep {{version}}
  - 'printf "hello\nworld\n" | ov --exit-write | grep world'
