distributable:
  url: https://github.com/Andriiklymiuk/corgi/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

display-name: corgi

versions:
  github: Andriiklymiuk/corgi
  strip: /v/

build:
  dependencies:
    go.dev: ^1.25
  env:
    CGO_ENABLED: 0
    LDFLAGS:
      - -s
      - -w
    linux:
      LDFLAGS:
        - -buildmode=pie
  script: go build -v -ldflags="${LDFLAGS}" -o {{prefix}}/bin/corgi

provides:
  - bin/corgi

test: corgi -h
