distributable:
  url: https://github.com/kubereboot/kured/archive/{{version.raw}}.tar.gz
  strip-components: 1

versions:
  github: kubereboot/kured

platforms:
  - linux/x86-64
  - linux/aarch64
  - darwin/x86-64
  - darwin/aarch64

build:
  dependencies:
    go.dev: '*'
  script:
    - go build $GO_ARGS -ldflags="$LD_FLAGS" ./cmd/kured
  env:
    CGO_ENABLED: 0
    LD_FLAGS:
      - -s -w
      - -X main.version={{version}}
    linux:
      LD_FLAGS:
        - -buildmode=pie
    GO_ARGS:
      - -trimpath
      - -o={{prefix}}/bin/kured

provides:
  - bin/kured

test:
  - kured --help 2>&1 | grep -i kured
