distributable:
  url: https://github.com/rakyll/hey/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

display-name: hey

versions:
  github: rakyll/hey

build:
  dependencies:
    go.dev: ^1.21
  script:
    - go build -trimpath -ldflags="$LDFLAGS" -o {{prefix}}/bin/hey .
  env:
    LDFLAGS:
      - -s
      - -w
    linux:
      LDFLAGS:
        - -buildmode=pie

provides:
  - bin/hey

test:
  - hey 2>&1 | grep "Usage: hey"
  - hey -n 1 -c 1 https://example.com
