distributable:
  url: https://github.com/Peltoche/lsd/archive/refs/tags/v{{ version }}.tar.gz
  strip-components: 1

provides:
  - bin/lsd

versions:
  github: Peltoche/lsd/tags

dependencies:
  libgit2.org: ~1.7

build:
  dependencies:
    rust-lang.org: '>=1.60'
    rust-lang.org/cargo: '*'
    github.com/mikefarah/yq: '>=4' # safe-edit toml version field
  script:
    # this was missed in 1.1.0, 1.1.2
    - yq -i '.package.version = "{{version}}"' Cargo.toml
    - cargo install --path . --root {{prefix}}

test:
  - test "$(lsd --version)" = "lsd {{version}}"
  - touch testfile
  - test "$(lsd --oneline)" = "testfile"
