distributable:
  url: https://github.com/equinix-labs/otel-cli/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: equinix-labs/otel-cli

provides:
  - bin/otel-cli

build:
  dependencies:
    go.dev: ~1.21.1
  script: go build -v -trimpath -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/otel-cli .
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X main.version={{version}}
      - -X main.commit=pkgx
      - -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie
    darwin:
      GO_LDFLAGS:
        # dyld[16248]: missing LC_UUID load command in /Users/jacob/.pkgx/github.com/swaggo/swag/v1.16.6/bin/swag
        # dyld[16248]: missing LC_UUID load command
        - -linkmode=external

test:
  dependencies:
    stedolan.github.io/jq: "*"
  script:
    - otel-cli status | tee out
    - test "$(jq -r '.config.service_name' out)" = "otel-cli"
