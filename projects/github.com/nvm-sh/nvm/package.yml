distributable:
  url: https://github.com/nvm-sh/nvm/archive/v{{version}}.tar.gz
  strip-components: 1

versions:
  github: nvm-sh/nvm

warnings:
  - vendored

runtime:
  env:
    NVM_DIR: "{{prefix}}"

dependencies:
  linux:
    curl.se: "*"

build:
  - run: mkdir -p bin libexec etc/bash_completion.d
    working-directory: "{{prefix}}"
  - install nvm.sh nvm-exec {{prefix}}/libexec/
  - install bash_completion {{prefix}}/etc/bash_completion.d/nvm
  - run: ln -s ../libexec/nvm-exec || true
    working-directory: "{{prefix}}/bin"
  - run: sed -i "s|unset NVM_CD_FLAGS|unset NVM_CD_FLAGS \&\& DIR=\$DIR/../libexec|g" nvm-exec
    working-directory: "{{prefix}}/libexec"

provides:
  - bin/nvm-exec

test:
  - export NVM_DIR="$PWD/.nvm"
  - NODE_VERSION=pkgx nvm-exec || echo $? | grep 127

  - mkdir -p "$NVM_DIR/versions/node/v99.0.0/bin"
  - run: install -Dm755 $FIXTURE "$NVM_DIR/versions/node/v99.0.0/bin/node"
    fixture: |
      #!/bin/sh
      echo "v99.0.0"
  - NODE_VERSION=v99.0.0 nvm-exec node -v | grep v99.0.0
