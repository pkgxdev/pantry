distributable:
  url: https://github.com/so-fancy/diff-so-fancy/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: so-fancy/diff-so-fancy

dependencies:
  perl.org: 5

runtime:
  env:
    PERL5LIB: "{{prefix}}/lib/perl5:{{prefix}}/libexec/lib/perl5:$PERL5LIB"

build:
  script:
    - run: sed -i -f $PROP diff-so-fancy
      prop: |
        s| \. "/lib";| \. "/../lib";|
        s/$ENV{USER}/($ENV{USER} || "")/
    - mkdir -p "{{prefix}}/bin"
    - install -Dm755 diff-so-fancy "{{prefix}}/bin"
    - cp -a lib "{{prefix}}"

provides:
  - bin/diff-so-fancy

test: diff-so-fancy --help
