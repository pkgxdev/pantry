distributable:
  url: https://github.com/vmware/tdnf/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

display-name: tdnf

versions:
  github: vmware/tdnf/releases

platforms: [linux] # rpm doesn't support darwin, and patching is a nightmare.

dependencies:
  rpm.org/rpm: "*"
  libexpat.github.io: "*"
  sqlite.org: 3
  opensuse.org/libsolv: "*"
  gnupg.org/gpgme: "*"
  gnupg.org/libgpg-error: "*"
  openssl.org: ~1.1
  curl.se: "*"

build:
  dependencies:
    cmake.org: ^3
  working-directory: build
  script:
    # tdnf hardcodes /etc paths, patch to use CMAKE_INSTALL_PREFIX
    - run: sed -i -f $PROP ../CMakeLists.txt
      prop: |
        s|set(CMAKE_INSTALL_FULL_SYSCONDIR "/etc")|set(CMAKE_INSTALL_FULL_SYSCONDIR "${CMAKE_INSTALL_PREFIX}/etc")|
        s|set(SYSCONFDIR /etc)|set(SYSCONFDIR "${CMAKE_INSTALL_PREFIX}/etc")|
        s|set(MOTGEN_DIR /etc/motdgen.d)|set(MOTGEN_DIR "${CMAKE_INSTALL_PREFIX}/etc/motdgen.d")|
    - mkdir -p {{prefix}}/etc {{prefix}}/var/lib/tdnf
    - cmake .. $CMAKE_ARGS
    - make --jobs {{ hw.concurrency }}
    - make install
  env:
    CMAKE_ARGS:
      - -DCMAKE_INSTALL_PREFIX={{prefix}}
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_EXE_LINKER_FLAGS=-ldl
      - -DCMAKE_SHARED_LINKER_FLAGS=-Wl,-ldl,-lssl,-lcrypto
      - -DSYSTEMD_DIR={{prefix}}/lib/systemd/system
      - -DHISTORY_DB_DIR={{prefix}}/var/lib/tdnf

provides:
  - bin/tdnf

test:
  # Representative test:
  #   1. tdnf --version returns the bottle's version
  #   2. tdnf can resolve + download + extract a real RPM from a real
  #      repo, into a user-writable rootfs. `filesystem` is the
  #      smallest sensible package (just FHS skeleton dirs); avoids
  #      the multi-minute install of a full rocky base set and keeps
  #      the test focused on "does tdnf work end-to-end".
  #
  # Fixes vs the previous test iteration:
  #   - dropped `sudo` — installing into a user-writable rootfs
  #     doesn't need root, and the wrapper was triggering brewkit's
  #     auto-fetch + `PKGX_PANTRY_DIR is set, refusing to update`
  #   - dropped `pkgx tdnf` wrapping — tdnf is already on PATH from
  #     `provides: bin/tdnf`; the wrapper'd `pkgx tdnf` is what
  #     bumped into the auto-fetch loop
  #   - --forcearch needs RPM's `_` (underscore) form per RPM
  #     convention, not pkgx's `-` form (`{{hw.arch}}` = "x86-64")
  env:
    RELEASE: '10'
    ROOTFS: rocky-${RELEASE}-rootfs
  script:
    - run: 'test "$(tdnf --version)" = "tdnf: {{version}}"'
    - run: |
        case "{{hw.arch}}" in
          x86-64)  ARCH=x86_64  ;;
          aarch64) ARCH=aarch64 ;;
        esac
        tdnf install \
          --installroot="$PWD/${ROOTFS}" \
          --releasever="${RELEASE}" \
          --forcearch="$ARCH" \
          --refresh \
          -y filesystem
        # Sanity-check: the package dropped its FHS dirs into rootfs.
        test -d "$PWD/${ROOTFS}/etc"
        test -d "$PWD/${ROOTFS}/usr/bin"