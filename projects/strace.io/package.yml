distributable:
  url: https://github.com/strace/strace/releases/download/v{{version.raw}}/strace-{{version.raw}}.tar.xz
  strip-components: 1

versions:
  github: strace/strace/releases/tags

platforms: linux

build:
  dependencies:
    linux:
      kernel.org/linux-headers: ">=6.20" # as of v7
  script:
    - run: cp {{deps.kernel.org/linux-headers.prefix}}/include/linux/time_types.h bundled/linux/include/uapi/linux/
      if: ">=7"
    - ./configure $ARGS
    - make --jobs {{hw.concurrency}} install
  env:
    ARGS:
      - --disable-dependency-tracking
      - --disable-silent-rules
      - --enable-mpers=no # FIX: configure: error: Cannot enable m32 personality support
      - --prefix="{{prefix}}"
      - --disable-gcc-Werror

provides:
  - bin/strace

test: strace true 2>&1
