distributable:
  # full-source artifact bundles the submodules (lib/napi etc.); added in v7.1.0.
  # wasmer switched its compression xz -> gz in v7.2.0, so try both. the bare
  # github tag archive is a LAST resort — it has NO submodules and won't build
  # versions that need them; it's only here for versions lacking a full-source.
  - url: https://github.com/wasmerio/wasmer/releases/download/{{version.tag}}/wasmer-full-source.tar.gz
    strip-components: 1
  - url: https://github.com/wasmerio/wasmer/releases/download/{{version.tag}}/wasmer-full-source.tar.xz
    strip-components: 1
  - url: https://github.com/wasmerio/wasmer/archive/refs/tags/{{version.tag}}.tar.gz
    strip-components: 1

versions:
  github: wasmerio/wasmer

interprets:
  extensions: wasm
  args: [wasmer, run]

dependencies:
  linux:
    sourceware.org/libffi: "*" # as of v7

build:
  dependencies:
    rust-lang.org: ^1.65
    rust-lang.org/cargo: ^0
    nodejs.org: ^18
    gnu.org/make: ^4
  env:
    RUSTFLAGS:
      # Ignore warnings (to focus on errors)
      - -A warnings
      # Remove debug information (to reduce binary size)
      - -C debuginfo=0
    linux:
      CC: clang
      CXX: clang++
      LD: clang
  script:
    - make build-wasmer
    - install -D target/release/wasmer "{{prefix}}"/bin/wasmer

provides:
  - bin/wasmer

test: test "$(wasmer --version)" = "wasmer {{version.raw}}"
