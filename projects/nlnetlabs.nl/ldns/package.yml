distributable:
  url: https://nlnetlabs.nl/downloads/ldns/ldns-{{ version }}.tar.gz
  strip-components: 1

versions:
  github: NLnetLabs/ldns/tags

dependencies:
  openssl.org: ^1

build:
  # ldns's public API is namespaced (`#include <ldns/…>`), so brewkit's default
  # header flattening (include/ldns/*.h -> include/*.h) buys nothing and instead
  # drops generically-named headers (util.h, net.h, error.h, parse.h, …) into
  # the include root. Those land on dependents' CPATH and shadow system headers:
  # e.g. openssh's `#include <util.h>` resolves to ldns's instead of the SDK's,
  # loses the openpty() declaration, and fails the darwin build. brewkit only
  # guards ISO-C stdlib names, not POSIX/BSD ones like util.h — so opt out.
  skip: flatten-includes
  dependencies:
    gnu.org/autoconf: '*'
    gnu.org/automake: '*'
    swig.org: '*'
  script: |
    autoreconf
    ./configure $ARGS
    make --jobs {{ hw.concurrency }} install

    # Oddly, the man pages are read-only, messing
    # up our build process
    find "{{ prefix }}"/share/man -type f -print0 | xargs -0 chmod u+w
  env:
    ARGS:
      - --prefix="{{prefix}}"
      - --with-drill
      - --with-ssl={{ deps.openssl.org.prefix }}
      - --disable-dane-verify
      - --without-xcode-sdk
    # weirdly, drill needs this to find `config.h`
    CFLAGS: "$CFLAGS -I$(pwd)/ldns"

provides:
  - bin/drill
  - bin/ldns-config

test: drill tea.xyz
