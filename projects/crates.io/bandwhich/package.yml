distributable:
  url: https://github.com/imsnif/bandwhich/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

provides:
  - bin/bandwhich

versions:
  github: imsnif/bandwhich

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script: cargo install --locked --path . --root {{prefix}}

test:
  - bandwhich --version | tee out
  - grep {{version}} out
