distributable:
  url: https://github.com/imsnif/bandwhich/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/bandwhich

versions:
  github: imsnif/bandwhich
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  bandwhich --version | grep {{version}}
