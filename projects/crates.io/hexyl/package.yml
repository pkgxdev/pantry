distributable:
  url: https://github.com/sharkdp/hexyl/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

provides:
  - bin/hexyl

versions:
  github: sharkdp/hexyl

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script: cargo install --locked --path . --root {{prefix}}

test:
  - hexyl --version | tee out
  - grep {{version}} out
  - echo hi | hexyl | tee out
  - grep -i '68 69' out
