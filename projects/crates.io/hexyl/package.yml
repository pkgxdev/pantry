distributable:
  url: https://github.com/sharkdp/hexyl/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/hexyl

versions:
  github: sharkdp/hexyl
  strip: /^v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  hexyl --version | grep {{version}}
  echo hi | hexyl | grep -i '68 69'
