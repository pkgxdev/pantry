distributable:
  url: https://github.com/cantino/mcfly/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/mcfly

versions:
  github: cantino/mcfly
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  mcfly --version | grep {{version}}
