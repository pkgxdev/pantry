distributable:
  url: https://github.com/atanunq/viu/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/viu

versions:
  github: atanunq/viu
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  viu --version | grep {{version}}
