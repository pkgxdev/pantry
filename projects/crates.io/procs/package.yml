distributable:
  url: https://github.com/dalance/procs/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

provides:
  - bin/procs

versions:
  github: dalance/procs

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test:
  - procs --version | tee out
  - grep {{version}} out
