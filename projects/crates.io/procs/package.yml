distributable:
  url: https://github.com/dalance/procs/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/procs

versions:
  github: dalance/procs
  strip: /^v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  procs --version | grep {{version}}
