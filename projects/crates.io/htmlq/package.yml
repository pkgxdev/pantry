distributable:
  url: https://github.com/mgdm/htmlq/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/htmlq

versions:
  github: mgdm/htmlq
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  htmlq --version | grep {{version}}
  echo '<p>hi</p>' | htmlq --text p | grep '^hi$'
