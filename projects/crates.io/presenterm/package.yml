distributable:
  url: https://github.com/mfontanini/presenterm/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/presenterm

versions:
  github: mfontanini/presenterm
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  presenterm --version | grep {{version}}
