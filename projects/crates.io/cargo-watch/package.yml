distributable:
  url: https://github.com/watchexec/cargo-watch/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/cargo-watch

versions:
  github: watchexec/cargo-watch
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  cargo-watch --version | grep {{version}}
