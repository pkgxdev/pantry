distributable:
  url: https://github.com/solidiquis/erdtree/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

provides:
  - bin/erd

versions:
  github: solidiquis/erdtree

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script: cargo install --locked --path . --root {{prefix}}

test:
  - erd --version | tee out
  - grep {{version}} out
