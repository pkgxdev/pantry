distributable:
  url: https://github.com/solidiquis/erdtree/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

provides:
  - bin/erd

versions:
  github: solidiquis/erdtree
  strip: /v/

build:
  dependencies:
    rust-lang.org/cargo: '*'
  script:
    cargo install --locked --path . --root {{prefix}}

test: |
  erd --version | grep {{version}}
