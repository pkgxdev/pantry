distributable:
  url: https://github.com/spider-rs/spider/archive/refs/tags/{{ version.tag }}.tar.gz
  strip-components: 1

provides:
  - bin/spider

versions:
  github: spider-rs/spider

build:
  dependencies:
    rust-lang.org: ">=1.56"
    rust-lang.org/cargo: "*"
  env:
    linux/x86-64:
      # -pie: ubuntu requires PIE (passes on debian without it, SIGILL on ubuntu)
      # target-cpu: prevent AVX etc. that CI runners may not support
      RUSTFLAGS: -C target-cpu=x86-64 -C link-args=-pie
  script:
    # needs openssl 3 on linux, but our rust locks us to 1.1.1
    - run: sed -f $PROP -i Cargo.toml
      working-directory: spider_cli
      if: linux
      prop: |
        /^serde_json =/a\
        openssl-sys = { version = "*", features = ["vendored"] }
    # io_uring is default-on but SIGILLs on CI ubuntu runners (since v2.47.22)
    - run: sed -i -E 's/,? *"io_uring"//' Cargo.toml
      working-directory: spider
      if: linux/x86-64
    # _requires_ spider/serde to build since 2.37.120
    - cargo install --path spider_cli --root {{prefix}} --features smart,spider/serde
  skip: fix-patchelf # dumps on x86-64

test:
  dependencies:
    linux/x86-64:
      gnu.org/binutils: "*"
      darwinsys.com/file: "*"
      strace.io: "*"
  script:
    - run:
        - BIN=$(command -v spider)
        - echo "=== file ==="
        - file $BIN
        - echo "=== readelf -h (ELF type) ==="
        - readelf -h $BIN | grep -i type
        - echo "=== readelf -d (RPATH/RUNPATH) ==="
        - readelf -d $BIN | grep -iE 'rpath|runpath|needed' || echo "(none)"
        - echo "=== ldd ==="
        - ldd $BIN
        - echo "=== AVX instruction count ==="
        - objdump -d $BIN | grep -c -iE 'vmov|vpadd|vpxor|vbroadcast|vzero' || echo "0"
        - echo "=== CPU flags ==="
        - grep -oP 'flags\s*:\s*\K.*' /proc/cpuinfo | head -1
        - echo "=== SIGILL crash analysis ==="
        - RUST_BACKTRACE=full strace -f -o /tmp/spider.strace spider -v --url https://choosealicense.com crawl 2>&1 || true
        - FAULT=$(grep 'si_addr=' /tmp/spider.strace | grep -oP 'si_addr=\K0x[0-9a-f]+' || true)
        - echo "fault addr=$FAULT"
        - echo "=== /proc/pid maps (text segment base) ==="
        - grep ' r.xp ' /tmp/spider.strace | head -5 || true
        - echo "=== last 20 lines before crash ==="
        - grep -B20 'SIGILL' /tmp/spider.strace | head -25 || true
        - echo "=== finding faulting function ==="
        - |
          if test -n "$FAULT"; then
            # use strace -i to get instruction pointer, which for PIE = file offset + base
            # instead, compute base from known mprotect of RELRO segment (782336 bytes from run 1)
            # dump all large mprotect PROT_READ calls to find the RELRO one
            echo "=== mprotect PROT_READ calls ==="
            grep 'mprotect.*PROT_READ)' /tmp/spider.strace | head -10 || true
            echo "=== readelf -l RELRO ==="
            readelf -l $BIN | grep -A1 GNU_RELRO || true
            echo "=== readelf -l all LOAD segments ==="
            readelf -l $BIN | grep -A1 'LOAD\|Entry' | head -20 || true
          fi
      if: linux/x86-64
    - spider -v --url https://choosealicense.com crawl
