distributable:
  url: https://github.com/PyO3/maturin/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

provides:
  - bin/maturin

versions:
  github: PyO3/maturin

build:
  dependencies:
    rust-lang.org: ^1.85
    rust-lang.org/cargo: "*"
    github.com/mikefarah/yq: ">=4" # safe-edit toml version field
  script:
    # missing version bump
    - yq -i '.package.version = "{{version}}"' Cargo.toml
    - run: EXTRA_ARGS="-Znext-lockfile-bump"
      if: ">=1.10"
    - cargo install --locked --path . --root {{prefix}} $EXTRA_ARGS

test: maturin --version | grep {{version}}
