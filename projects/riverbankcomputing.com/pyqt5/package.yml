# PyQt5 — built from the PyPI sdist with sip-install (the SIP build tool from
# riverbankcomputing.com/sip + the pyqtbuild backend from
# riverbankcomputing.com/pyqt-builder), linked against the Qt5 from qt.io.
#
# Notes:
#   - Qt5 is NOT bundled (unlike the old PyPI wheel): the built bindings load
#     qt.io's Qt5 libs at runtime, hence qt.io is a runtime dependency and we
#     point sip-install at its qmake.
#   - PyQt5's generated QtGui/QtWidgets C++ units are huge; unbounded parallel
#     compilation OOM-killed CI, so we bound it with `--jobs 1` (+ MAKEFLAGS=-j1).
#   - PyQt5 uses the separate PyQt5-sip runtime module (the private `PyQt5.sip`):
#     sip-install does NOT build it, so we pip-install PyQt5-sip into the venv.

distributable:
  url: https://pypi.io/packages/source/P/PyQt5/PyQt5-{{ version.raw }}.tar.gz
  strip-components: 1
versions:
  url: https://pypi.org/simple/pyqt5/
  match: /PyQt5-\d+\.\d+\.\d+\.tar\.gz/
  strip: [/^PyQt5-/, /\.tar\.gz/]
platforms: [linux/x86-64, linux/aarch64, darwin/x86-64, darwin/aarch64]
dependencies:
  pkgx.sh: ">=1"
  python.org: ~3.11
  qt.io: ~5.15  # Qt5 is no longer bundled; bindings load it at runtime
  linux:   # Qt5's xcb plugin GUI stack, needed at runtime
    gnome.org/glib: '*'
    freetype.org: '*'
    freedesktop.org/fontconfig: '*'
    freedesktop.org/dbus: '*'
    xkbcommon.org: '*'
    mesa3d.org: '*'
    x.org/x11: '*'
    x.org/xcb: '*'
    x.org/xcb-util: '*'
    x.org/xrender: '*'
    x.org/xfixes: '*'
    x.org/xrandr: '*'
    x.org/xi: '*'
    x.org/xau: '*'
    x.org/xdmcp: '*'
runtime:
  env:
    PYTHONPATH: "${{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages"
build:
  dependencies:
    python.org: ~3.11
    riverbankcomputing.com/sip: '*'           # provides sip-install/sip-build
    riverbankcomputing.com/pyqt-builder: '*'  # pyqtbuild backend sip-install uses
    qt.io: ~5.15                              # qmake + Qt5 headers/libs
    gnu.org/make: '*'
  script:
    - bkpyvenv stage {{prefix}} {{version}}
    # Build + install PyQt5 from the extracted sdist against qt.io's Qt5.
    # --confirm-license: accept the GPL terms non-interactively (else CI hangs).
    # --jobs 1 (+ MAKEFLAGS=-j1): bound the C++ compile to avoid OOM.
    # --target-dir: land PyQt5/ in the venv site-packages so PYTHONPATH/test work.
    - sip-install
        --confirm-license
        --qmake {{deps.qt.io.prefix}}/bin/qmake
        --jobs 1
        --target-dir {{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages
        --verbose
    # PyQt5 needs the separate PyQt5-sip runtime module (private PyQt5.sip);
    # sip-install does not build it, so install it into the venv.
    - '{{prefix}}/venv/bin/pip install PyQt5-sip'
    - bkpyvenv seal {{prefix}} pyuic5 pyrcc5 pylupdate5
  env:
    MAKEFLAGS: -j1  # belt-and-suspenders OOM bound for the qmake-driven C++ build
provides: [bin/pyuic5, bin/pyrcc5, bin/pylupdate5]
test:
  dependencies: { python.org: ~3.11 }
  script:
    - pyuic5 --version 2>&1 | grep {{version}}
    - python{{deps.python.org.version.marketing}} -c "from PyQt5 import QtCore, QtWidgets; print(QtCore.QT_VERSION_STR)"
