# PyQt5 â€” Python bindings for Qt 5, installed from upstream's official
# PyPI wheel (which bundles the Qt5 libraries). Provides the
# pyuic5/pyrcc5/pylupdate5 tools and an importable `PyQt5`.
#
# Why vendored (wheel): building PyQt5 from the sip sources compiles
# enormous generated C++ per binding and OOM-killed CI; splitting into
# per-binding sub-recipes then hit a lockstep co-dependency (each
# binding 404'd resolving its sibling's not-yet-published bottle). The
# official wheel sidesteps both, in one package.
#
# Why darwin-only: the macOS wheels are self-contained (Qt5 + the
# platform plugin are bundled and rpath-wired), so QtWidgets imports
# with no external deps. The manylinux wheel is NOT self-contained â€” its
# QtGui/QtWidgets dlopen the host X11/xcb/mesa GUI stack (libxcb,
# libX11, libGL, â€¦), none of which pantry currently packages. QtCore
# alone imports on linux (it only needs gnome.org/glib), but a PyQt5 that
# can't load QtWidgets defeats the point, so linux is omitted rather than
# shipped half-working.
#
# Path to a from-source recipe (and to restoring linux): land the Qt5 GUI
# runtime in pantry (libxcb + xcb-util-*, libX11, mesa/libGL, libxkbcommon,
# fontconfig, freetype, dbus), then either depend on them at runtime for
# the manylinux wheel, or compile riverbankcomputing.com/sip + the PyQt5
# bindings against a pantry Qt5 (qtbase) with bounded compile parallelism
# (the unbounded per-binding C++ compile is what OOM-killed CI before).

distributable:
  url: https://pypi.io/packages/source/P/PyQt5/PyQt5-{{ version.raw }}.tar.gz
  strip-components: 1

versions:
  url: https://pypi.org/simple/pyqt5/
  match: /PyQt5-\d+\.\d+\.\d+\.tar\.gz/
  strip:
    - /^PyQt5-/
    - /\.tar\.gz/

platforms:
  - darwin/x86-64
  - darwin/aarch64

dependencies:
  pkgx.sh: ">=1"
  python.org: ~3.11

runtime:
  env:
    # Expose `import PyQt5` to users/dependents from the sealed venv.
    PYTHONPATH: "${{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages"

build:
  dependencies:
    python.org: ~3.11
  script:
    # Install the prebuilt wheels (Qt bundled) into a venv â€” pip and
    # python there share a version, so PyQt5-sip's ABI matches python.
    # `--only-binary` guarantees the wheel (never an sdist recompile).
    - bkpyvenv stage {{prefix}} {{version}}
    - '${{prefix}}/venv/bin/pip install --only-binary=:all: PyQt5=={{version}} PyQt5-sip'
    - bkpyvenv seal {{prefix}} pyuic5 pyrcc5 pylupdate5

provides:
  - bin/pyuic5
  - bin/pyrcc5
  - bin/pylupdate5

test:
  dependencies:
    python.org: ~3.11
  script:
    - pyuic5 --version 2>&1 | grep {{version}}
    - python{{deps.python.org.version.marketing}} -c "from PyQt5 import QtCore, QtWidgets; print(QtCore.QT_VERSION_STR)"
