# PyQt5 — Python bindings for Qt 5.
#
# Companion to pantry's qt.io (5.15.10) and riverbankcomputing.com/sip.
# Installed as a python-venv with `pip install PyQt5` against the
# pantry Qt5 + SIP build.
#
# Closes part of pkgxdev/pantry#99 (Top 300 holdout #591).

distributable:
  url: https://pypi.io/packages/source/P/PyQt5/PyQt5-{{ version.raw }}.tar.gz
  strip-components: 1

versions:
  url: https://pypi.org/simple/pyqt5/
  match: /PyQt5-\d+\.\d+\.\d+\.tar\.gz/
  strip:
    - /^PyQt5-/
    - /\.tar\.gz/

platforms:
  - linux/x86-64
  - linux/aarch64
  - darwin/x86-64
  - darwin/aarch64

dependencies:
  python.org: ~3.11
  qt.io: ^5
  riverbankcomputing.com/sip: '*'

runtime:
  env:
    PYTHONPATH: '{{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages:$PYTHONPATH'

build:
  dependencies:
    riverbankcomputing.com/pyqt-builder: '*'
    freedesktop.org/pkg-config: '*'
    linux:
      llvm.org: <17

  script:
    # python-venv-alt: brewkit's stock python-venv.sh was OOM-killed
    # (exit 137) at PyQt5's pip-install — GitHub runners have ~7 GB
    # RAM and pyqt-builder builds the ~30 Qt bindings in parallel,
    # each peaking at 4–6 GB per ld process. MAKEFLAGS=-j1 alone
    # doesn't help: pyqt-builder spawns multiple `make` processes,
    # one per binding, and the inner-make's -j1 only serialises within
    # each binding. The outer parallelism is what kills the runner.
    #
    # Two knobs that together fit the build in 7 GB:
    #
    #   --config-settings=--jobs=1
    #     Tells pyqt-builder itself to build ONE binding at a time.
    #     This is the load-bearing flag.
    #
    #   --config-settings=--disable=Qt<heavy>
    #     Drops the highest-RAM bindings (QtMultimedia, QtPdf,
    #     QtQuick, Qt3D*, QtWebKit, QtBluetooth, QtPositioning,
    #     QtSensors, QtXmlPatterns, QtWebChannel, QtNfc). The
    #     remaining bindings cover the 95 % use case (Core/Gui/
    #     Widgets/Network/Sql/Svg/DBus/Test).
    #
    # If this pattern proves useful, lift the knobs into brewkit as
    # python-venv-alt.sh (or as a --jobs flag on python-venv.sh).
    - run: |
        PYVER={{deps.python.org.version.marketing}}
        "{{deps.python.org.prefix}}/bin/python$PYVER" -m venv --copies "{{prefix}}/venv"
        PYTHON="{{prefix}}/venv/bin/python"
        "$PYTHON" -m pip install --upgrade pip wheel setuptools --quiet

        export CXXFLAGS="${CXXFLAGS} -g0"
        export CFLAGS="${CFLAGS} -g0"

        DISABLE_FLAGS=""
        for mod in QtMultimedia QtMultimediaWidgets QtPdf QtPdfWidgets \
                   QtQml QtQuick QtQuickWidgets QtQuick3D \
                   Qt3DCore Qt3DRender Qt3DInput Qt3DLogic Qt3DAnimation Qt3DExtras \
                   QtWebKit QtWebKitWidgets QtWebChannel QtWebSockets \
                   QtBluetooth QtPositioning QtSensors QtNfc \
                   QtXmlPatterns QtSerialPort QtRemoteObjects QtTextToSpeech \
                   QtX11Extras QtMacExtras QtWinExtras; do
          DISABLE_FLAGS="$DISABLE_FLAGS --config-settings=--disable=$mod"
        done

        "$PYTHON" -m pip install "$SRCROOT" \
          --no-build-isolation \
          --config-settings=--jobs=1 \
          $DISABLE_FLAGS \
          --verbose

    # Expose the python binary as a marker so provides: has something.
    - run: |
        mkdir -p {{prefix}}/bin
        ln -sf ../venv/bin/python "{{prefix}}/bin/pyqt5-python"

test:
  script:
    - pyqt5-python -c "from PyQt5 import QtCore; print(QtCore.QT_VERSION_STR)"

provides:
  - bin/pyqt5-python
