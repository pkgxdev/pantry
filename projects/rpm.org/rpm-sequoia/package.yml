distributable:
  url: https://github.com/rpm-software-management/rpm-sequoia/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

display-name: rpm-sequoia

versions:
  github: rpm-software-management/rpm-sequoia/tags
  strip:
    - /^v/

dependencies:
  openssl.org: "*"

build:
  dependencies:
    rust-lang.org: ">=1.85"
    openssl.org: "*"
  env:
    OPENSSL_DIR: "{{deps.openssl.org.prefix}}"
    LDFLAGS: "-L{{deps.openssl.org.prefix}}/lib"
    CPPFLAGS: "-I{{deps.openssl.org.prefix}}/include"
    PKG_CONFIG_PATH: "{{deps.openssl.org.prefix}}/lib/pkgconfig:$PKG_CONFIG_PATH"
  script:
    - cargo build --release --no-default-features --features crypto-openssl
    - mkdir -p {{prefix}}/lib/pkgconfig
    - install -Dm755 target/release/librpm_sequoia.so {{prefix}}/lib/
    - ln -sf librpm_sequoia.so {{prefix}}/lib/librpm_sequoia.so.1
    - sed 's|/usr/local|{{prefix}}|' target/release/rpm-sequoia.pc >{{prefix}}/lib/pkgconfig/rpm-sequoia.pc

runtime:
  env:
    LD_LIBRARY_PATH: "{{deps.openssl.org.prefix}}/lib:$LD_LIBRARY_PATH"

test:
  dependencies:
    openssl.org: "*"
  env:
    LD_LIBRARY_PATH: "{{deps.openssl.org.prefix}}/lib:$LD_LIBRARY_PATH"
  script:
    - test -f {{prefix}}/lib/librpm_sequoia.so
    - test -f {{prefix}}/lib/pkgconfig/rpm-sequoia.pc
