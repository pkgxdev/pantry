distributable:
  url: http://ftp.rpm.org/releases/rpm-{{version.major}}.{{version.minor}}.x/rpm-{{version}}.tar.bz2
  strip-components: 1

display-name: rpm

platforms: [linux] # they don't officially support darwin, and it's a bear to patch

versions:
  github: rpm-software-management/rpm
  strip:
    - /^rpm-/
    - /-release$/

dependencies:
  lua.org: ~5.4
  gnu.org/gmp: "*"
  libarchive.org: "*"
  darwinsys.com/file: "*"
  rpm.org/popt: "*"
  gnu.org/readline: "*"
  invisible-island.net/ncurses: "*"
  sqlite.org: "*"
  tukaani.org/xz: "*"
  facebook.com/zstd: "*"
  elfutils.org: "*"
  gnu.org/gcc/libstdcxx: ">=15"
  gnu.org/gcc/libgomp: ">=15"
  openssl.org: "*"
  rpm.org/rpm-sequoia: "*"

build:
  dependencies:
    cmake.org: ^3.18
    lua.org: ~5.4
    zlib.net: "*"
    sqlite.org: "*"
    tukaani.org/xz: "*"
    libarchive.org: "*"
    darwinsys.com/file: "*"
    gnu.org/gettext: "*"
    invisible-island.net/ncurses: "*"
    python.org: ">=3.10"
    sr.ht/scdoc: "*"
    curl.se: "*"
    gnu.org/tar: "*"
    gnu.org/gcc: ">=15"
    gnu.org/binutils: ~2.44
    openssl.org: "*"
    rpm.org/rpm-sequoia: "*"
  env:
    CC: gcc
    CXX: g++
    _PKG_CONFIG_PATHS:
      - "{{deps.rpm.org/rpm-sequoia.prefix}}/lib/pkgconfig"
      - "{{deps.rpm.org/popt.prefix}}/lib/pkgconfig"
      - "{{deps.gnu.org/readline.prefix}}/lib/pkgconfig"
      - "{{deps.invisible-island.net/ncurses.prefix}}/lib/pkgconfig"
      - "{{deps.facebook.com/zstd.prefix}}/lib/pkgconfig"
      - "{{deps.elfutils.org.prefix}}/lib/pkgconfig"
      - "{{deps.zlib.net.prefix}}/lib/pkgconfig"
      - "{{deps.sqlite.org.prefix}}/lib/pkgconfig"
      - "{{deps.tukaani.org/xz.prefix}}/lib/pkgconfig"
      - "{{deps.libarchive.org.prefix}}/lib/pkgconfig"
      - "{{deps.lua.org.prefix}}/lib/pkgconfig"
      - "{{deps.openssl.org.prefix}}/lib/pkgconfig"
    LDFLAGS: "-L{{deps.darwinsys.com/file.prefix}}/lib"
    #
    # is it possible to have the array syntax built-in?
    # maybe with
    # VAR:
    #   join: ':'
    #   values:
    #     - a
    #     - b
    _LD_LIB_PATHS:
      - "{{deps.darwinsys.com/file.prefix}}/lib"
      - "{{deps.openssl.org.prefix}}/lib"
    CMAKE_ARGS:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_COMPILER=gcc
      - -DCMAKE_CXX_COMPILER=g++
      - -DCMAKE_INSTALL_PREFIX={{prefix}}
      - -DCMAKE_INSTALL_SYSCONFDIR={{prefix}}/etc
      - -DCMAKE_INSTALL_SHAREDSTATEDIR={{prefix}}/var/lib
      - -DCMAKE_INSTALL_LOCALSTATEDIR={{prefix}}/var
      - -DENABLE_NLS=ON
      - -DENABLE_PLUGINS=OFF
      - -DENABLE_PYTHON=OFF
      - -DWITH_AUDIT=OFF
      - -DWITH_SELINUX=OFF
      - -DRPM_VENDOR=pkgx
      - -DENABLE_TESTSUITE=OFF
      - -DWITH_ACL=OFF
      - -DWITH_CAP=OFF
      - -DLUA_INCLUDE_DIR={{deps.lua.org.prefix}}/include
      - -DLUA_LIBRARY={{deps.lua.org.prefix}}/lib/liblua.so
      - -DLUA_LIBRARIES={{deps.lua.org.prefix}}/lib/liblua.so
      - -DMAGIC_LIBRARY={{deps.darwinsys.com/file.prefix}}/lib/libmagic.so
      - -DMAGIC_INCLUDE_DIR={{deps.darwinsys.com/file.prefix}}/include
      - -DSCDOC={{deps.sr.ht/scdoc.prefix}}/bin/scdoc
      - -DGETTEXT_MSGMERGE_EXECUTABLE={{deps.gnu.org/gettext.prefix}}/bin/msgmerge
      - -DGETTEXT_MSGFMT_EXECUTABLE={{deps.gnu.org/gettext.prefix}}/bin/msgfmt
      - -DXGETTEXT={{deps.gnu.org/gettext.prefix}}/bin/xgettext
  working-directory: build
  script:
    - export PKG_CONFIG_PATH=$(echo "$_PKG_CONFIG_PATHS" | tr ' ' ':'):$PKG_CONFIG_PATH
    - export LD_LIBRARY_PATH=$(echo "$_LD_LIB_PATHS" | tr ' ' ':'):$LD_LIBRARY_PATH
    - cmake "$PKGX_PANTRY_DIR/srcs/rpm.org__rpm-{{version}}" $CMAKE_ARGS
    - cmake --build .
    - cmake --install .
    - ln -sf "{{deps.lua.org.prefix}}/lib/liblua.so" "{{prefix}}/lib/liblua.so"

runtime:
  env:
    RPM_CONFIGDIR: "{{prefix}}/lib/rpm"

provides:
  - bin/rpm

test:
  dependencies:
    openssl.org: "*"
    lua.org: ~5.4
    rpm.org/rpm-sequoia: "*"
  env:
    RPM_CONFIGDIR: "{{prefix}}/lib/rpm"
  script:
    - test "$(rpm --version)" = "RPM version {{version}}"
    - "rpm --eval '%{lua:print(_VERSION)}' | grep -q '^Lua 5\\.4$'"
