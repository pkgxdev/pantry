distributable:
  url: https://github.com/mondoohq/mql/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: mondoohq/mql

build:
  dependencies:
    go.dev: ~1.25.6 # as of v13
  script:
    - run:
        - go build $ARGS -o={{prefix}}/bin/cnquery -ldflags="$GO_LDFLAGS" ./apps/cnquery/cnquery.go
        - ln -s cnquery {{prefix}}/bin/mql
      if: <13
    - run:
        - go build $ARGS -o={{prefix}}/bin/mql -ldflags="$GO_LDFLAGS" ./apps/mql/mql.go
        - ln -s mql {{prefix}}/bin/cnquery
      if: ">=13"
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X go.mondoo.com/mql/v13.Version={{version}}
      - -X go.mondoo.com/mql/v13.Build=pkgx
      - -X go.mondoo.com/mql/v13.Date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
    linux:
      GO_LDFLAGS:
        - -buildmode=pie
    ARGS:
      - -v
      - -trimpath

provides:
  - bin/cnquery
  - bin/mql # renamed for v13

test:
  dependencies:
    curl.se: "*"
  script:
    - run: BIN=cnquery
      if: <13
    - run: BIN=mql
      if: ">=13"
    - $BIN version | tee out
    - grep "{{version}}" out
    - $BIN run -c "ports.listening { port process }"
    - curl -L "https://raw.githubusercontent.com/mondoohq/$BIN/main/examples/complex.mql.yaml" -o complex.mql.yaml
    - curl -L "https://raw.githubusercontent.com/mondoohq/$BIN/main/examples/example-os.mql.yaml" -o example-os.mql.yaml
    - run: $BIN scan -f complex.mql.yaml | grep 'Summary (1 assets)'
      if: <13
