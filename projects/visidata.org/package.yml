# https://visidata.org
# terminal spreadsheet multitool for discovering & arranging tabular data
distributable:
  # upstream tags are mixed 2-/3-component (v3.4, but also v3.1.1), so use the
  # raw tag (incl. `v`) rather than a version template — {{version}} would be
  # v3.4.0 (404), and v{{version.marketing}} would break patch releases.
  url: https://github.com/saulpw/visidata/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: saulpw/visidata

dependencies:
  pkgx.sh: ">=1"
  python.org: "~3.11"

runtime:
  env:
    PYTHONPATH: ${{prefix}}/venv/lib/python{{deps.python.org.version.marketing}}/site-packages

build:
  dependencies:
    python.org: "~3.11"
  script:
    - bkpyvenv stage {{prefix}} {{version}}
    - ${{prefix}}/venv/bin/pip install .
    - bkpyvenv seal {{prefix}} vd visidata

provides:
  - bin/vd
  - bin/visidata

test:
  # vd prints the bare upstream version (saul.pw/VisiData v3.3); pantry pads
  # the 2-component release to 3.3.0, so grep the marketing (major.minor) form.
  - vd --version 2>&1 | tee out
  - grep "{{version.marketing}}" out
