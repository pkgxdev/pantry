distributable:
  url: https://github.com/fwdcloudsec/granted/archive/refs/tags/{{version.tag}}.tar.gz
  strip-components: 1

versions:
  github: fwdcloudsec/granted

provides:
  - bin/granted

build:
  dependencies:
    go.dev: ~1.25.7
  script:
    - go mod download
    - go build -v -trimpath -ldflags="$GO_LDFLAGS" -o {{prefix}}/bin/granted ./cmd/granted
  env:
    GO_LDFLAGS:
      - -s
      - -w
      - -X github.com/common-fate/granted/internal/build.Version={{version}}
      # as of 0.39.0
      - -X github.com/fwdcloudsec/granted/internal/build.Version={{version}}
    linux:
      # or segmentation fault
      # fix found here https://github.com/docker-library/golang/issues/402#issuecomment-982204575
      GO_LDFLAGS:
        - -buildmode=pie

test:
  - granted -v 2>&1 | tee out
  - grep {{version}} out
