distributable:
  url: https://github.com/cython/cython/archive/refs/tags/{{version}}.tar.gz
  strip-components: 1

versions:
  github: cython/cython/releases

provides:
  - bin/cython

dependencies:
  python.org: "<3.13"

runtime:
  env:
    PYTHONPATH: "{{prefix}}/venv/lib/python{{deps.python.org.version.major}}/site-packages:$PYTHONPATH"

build:
  script:
    - python-venv.py {{prefix}}/bin/cython
    - run: ln -s python{{deps.python.org.version.marketing}} python{{deps.python.org.version.major}}
      working-directory: ${{prefix}}/venv/lib
    - python -m pip install --prefix={{prefix}}/venv setuptools
  dependencies:
    pip.pypa.io: "*"

test:
  dependencies:
    llvm.org: "*"
  env:
    PYTHONPATH: "{{prefix}}/venv/lib/python{{deps.python.org.version.major}}/site-packages:$PYTHONPATH"
    linux:
      CC: clang
      AS: llvm-as
  script:
    - python setup.py build_ext --inplace
    - test "$(python -c 'import package_manager')" = "You are using pkgx"
